services:
  app:
    image: ctc-manager:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SPRING_SECURITY_USER_NAME: ${CTC_ADMIN_USER}
      SPRING_SECURITY_USER_PASSWORD: ${CTC_ADMIN_PASSWORD}
      # Discord integration (v1.13). Token is required for any Discord API call;
      # webhook URLs and snowflakes are persisted via /admin/discord-config UI
      # (no dev-seeder in the prod profile).
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
    ports:
      - "8080:8080"
    volumes:
      - ctc-uploads:/app/uploads
      - ctc-site-output:/app/ctc-site-output
      - ctc-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  ctc-uploads:
  ctc-site-output:
  ctc-logs:
