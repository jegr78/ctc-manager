name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4.0.2
        with:
          filters: |
            code:
              - 'src/**'
              - 'pom.xml'
              - 'lombok.config'
              - 'config/**'
              - 'rewrite.yml'
              - '.dockerignore'
              - 'Dockerfile'
              - '.github/workflows/**'
              - 'mvnw'
              - 'mvnw.cmd'
              - '.mvn/**'
            docs:
              - '.planning/**'
              - '*.md'
              - 'docs/**'
              - '!docs/site/**'
              - '.gitmessage'

  build-and-test:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 25
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Cache Playwright browser binaries (~170 MiB Chromium + ~2.3 MiB FFmpeg) keyed
      # on the pinned Playwright version in pom.xml. A warm cache short-circuits the
      # download in the next step and prevents Surefire JVM forks from auto-downloading
      # Chromium during unit tests (which corrupts the Surefire stdout channel — see
      # CI run 26015174076 / surefire-reports/2026-05-18T05-24-53_082-jvmRun2.dumpstream).
      - name: Cache Playwright Browsers
        if: needs.changes.outputs.code == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.59.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Install Playwright Browsers BEFORE Surefire runs. Order matters: when this step
      # ran AFTER `./mvnw verify` (the old layout), Spring-context-loading Surefire tests
      # that transitively touched TeamCardService could trigger Playwright's auto-download
      # inside a forked JVM and corrupt the Surefire fork-channel, breaking the build with
      # exit code 1 and zero failing tests (cf. CI run 26015174076 root cause).
      #
      # Install ALL default browsers (Chromium + Firefox + WebKit), not just Chromium.
      # Project code only uses chromium() (TeamCardService, AbstractGraphicService) and
      # E2E tests pin to chromium() in PlaywrightConfig, but `Playwright.create()`'s
      # internal driver still triggers Firefox + WebKit auto-downloads on first use
      # (observed in CI run 26031388903 — Firefox 148.0.2 v1511 downloaded mid-Surefire
      # despite Chromium being pre-installed). Pre-installing the full browser set
      # avoids that secondary auto-download path entirely. Cache footprint ~360 MiB.
      - name: Install Playwright Browsers
        if: needs.changes.outputs.code == 'true'
        run: |
          mvn dependency:build-classpath -DincludeScope=test -Dmdep.outputFile=/tmp/cp.txt -q
          java -cp "$(cat /tmp/cp.txt)" com.microsoft.playwright.CLI install --with-deps

      - name: Build, Test, and E2E
        if: needs.changes.outputs.code == 'true'
        run: ./mvnw clean verify -Pe2e --no-transfer-progress -Dspring.profiles.active=dev -Ddocker.available=true

      - name: JaCoCo Coverage Report
        if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 80
          title: "Coverage Report"
          update-comment: true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  dockerfile-noble-pin-guard:
    # Structural guard for the eclipse-temurin -noble suffix pin in Dockerfile.
    # Fails if any `FROM eclipse-temurin:` line does not end in `-noble`.
    # Whitelist-on-suffix approach. Cross-platform grep idiom mirrors pom.xml PLAT-07
    # build-guard (commit f451ff4).
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dockerfile -noble pin guard
        if: needs.changes.outputs.code == 'true'
        run: |
          set -euo pipefail
          # Extract every FROM eclipse-temurin: line (anchored regex via grep -E, cross-platform).
          from_lines=$(grep -E '^FROM eclipse-temurin:' Dockerfile || true)
          if [ -z "$from_lines" ]; then
            echo "[noble-pin-guard] ERROR: No 'FROM eclipse-temurin:' lines found in Dockerfile."
            echo "Either the base image was changed away from eclipse-temurin (update this guard) or the Dockerfile is missing."
            exit 1
          fi
          # Whitelist: every FROM eclipse-temurin: line MUST contain the fixed substring '-noble'.
          # Two-stage extract-then-filter mirrors pom.xml PLAT-07 (commit f451ff4):
          # grep -E extracts the candidate set; grep -F is the cross-platform fixed-string filter.
          # NOTE: pass the leading-dash pattern via -e to avoid BSD-grep parsing '-noble' as flags
          # (the exact portability trap commit f451ff4 documented for the Thymeleaf build-guard).
          violations=$(printf '%s\n' "$from_lines" | grep -v -F -e '-noble' || true)
          if [ -n "$violations" ]; then
            echo "[noble-pin-guard] FAIL: Dockerfile uses an unpinned eclipse-temurin tag."
            echo "All 'FROM eclipse-temurin:' lines must end in '-noble' (e.g. '25-jdk-noble', '25-jre-noble')."
            echo "Reason: Playwright 1.59.0 does not support Ubuntu 26.04 (Plucky), which the bare '25-jre' tag silently rotated to in release run 25609204039."
            echo "See Dockerfile and its comment block for the -noble pin rationale."
            echo ""
            echo "Offending line(s):"
            echo "$violations"
            exit 1
          fi
          echo "[noble-pin-guard] OK - all 'FROM eclipse-temurin:' lines are pinned to -noble."
          echo "$from_lines"

  docker-build:
    # Exercises `docker build .` on every PR + push to master so Dockerfile / base-image
    # regressions fail fast on PR instead of on release. In particular, exercises stage 2's
    # `playwright install chromium` RUN step — the exact step that failed in release run
    # 25609204039 before the -noble pin.
    # Full build job, always on. Acceptable cost: +1-3 minutes CI per PR.
    needs: [changes, dockerfile-noble-pin-guard]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: needs.changes.outputs.code == 'true'
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Docker image (full multi-stage, no push)
        if: needs.changes.outputs.code == 'true'
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          tags: ctc-manager:ci-${{ github.sha }}
          cache-from: type=gha,scope=ctc-docker
          cache-to: type=gha,scope=ctc-docker,mode=max
