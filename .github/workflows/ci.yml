name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Unit/Integration Tests
        run: ./mvnw verify -Dspring.profiles.active=dev

      - name: Install Playwright Browsers
        run: |
          mvn dependency:build-classpath -DincludeScope=test -Dmdep.outputFile=/tmp/cp.txt -q
          java -cp "$(cat /tmp/cp.txt):target/test-classes:target/classes" com.microsoft.playwright.CLI install --with-deps chromium

      - name: E2E Tests
        run: ./mvnw verify -Pe2e -Dspring.profiles.active=dev

      - name: JaCoCo Coverage Report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 80
          title: "Coverage Report"
          update-comment: true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  dockerfile-noble-pin-guard:
    # Phase 78: Structural guard for the eclipse-temurin -noble suffix pin in Dockerfile.
    # Fails if any `FROM eclipse-temurin:` line does not end in `-noble`.
    # Whitelist-on-suffix approach (D-05). Failure message references Phase 78 (D-04 style).
    # Cross-platform grep idiom mirrors pom.xml PLAT-07 build-guard (commit f451ff4).
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dockerfile -noble pin guard
        run: |
          set -euo pipefail
          # Extract every FROM eclipse-temurin: line (anchored regex via grep -E, cross-platform).
          from_lines=$(grep -E '^FROM eclipse-temurin:' Dockerfile || true)
          if [ -z "$from_lines" ]; then
            echo "[Phase 78 build-guard] ERROR: No 'FROM eclipse-temurin:' lines found in Dockerfile."
            echo "Either the base image was changed away from eclipse-temurin (update this guard) or the Dockerfile is missing."
            exit 1
          fi
          # Whitelist: every FROM eclipse-temurin: line MUST contain the fixed substring '-noble'.
          # Two-stage extract-then-filter mirrors pom.xml PLAT-07 (commit f451ff4):
          # grep -E extracts the candidate set; grep -F is the cross-platform fixed-string filter.
          # NOTE: pass the leading-dash pattern via -e to avoid BSD-grep parsing '-noble' as flags
          # (the exact portability trap commit f451ff4 documented for the Phase 71-05 build-guard).
          violations=$(printf '%s\n' "$from_lines" | grep -v -F -e '-noble' || true)
          if [ -n "$violations" ]; then
            echo "[Phase 78 build-guard] FAIL: Dockerfile uses an unpinned eclipse-temurin tag."
            echo "All 'FROM eclipse-temurin:' lines must end in '-noble' (e.g. '25-jdk-noble', '25-jre-noble')."
            echo "Reason: Playwright 1.59.0 does not support Ubuntu 26.04 (Plucky), which the bare '25-jre' tag silently rotated to in release run 25609204039."
            echo "See .planning/phases/78-docker-release-image-fix/78-CONTEXT.md (decisions D-01, D-05, D-06)."
            echo ""
            echo "Offending line(s):"
            echo "$violations"
            exit 1
          fi
          echo "[Phase 78 build-guard] OK - all 'FROM eclipse-temurin:' lines are pinned to -noble."
          echo "$from_lines"

  docker-build:
    # Phase 78: Exercises `docker build .` on every PR + push to master so future
    # Dockerfile / base-image regressions fail fast on PR instead of on release.
    # In particular, exercises stage 2's `playwright install chromium` RUN step —
    # the exact step that failed in release run 25609204039 before the -noble pin.
    # D-07: full build job, always on. D-08: no separate path-filtered job.
    # Acceptable cost: +1-3 minutes CI per PR (explicitly accepted by user).
    needs: dockerfile-noble-pin-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image (full multi-stage, no push)
        id: docker_build
        run: |
          set -euo pipefail
          IMAGE_TAG="ctc-manager:ci-${GITHUB_SHA}"
          echo "Building $IMAGE_TAG from pinned -noble base..."
          docker build -t "$IMAGE_TAG" . 2>&1 | tee /tmp/docker-build.log
          echo "Built $IMAGE_TAG successfully."
          docker image inspect "$IMAGE_TAG" --format 'Image ID: {{.Id}} Size: {{.Size}}'

      - name: Upload docker build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-build-log
          path: /tmp/docker-build.log
          retention-days: 7
