app:
  upload-dir: data/dev/uploads
  version: @project.version@

spring:
  application:
    name: ctc-manager
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    # OSIV: Hibernate session stays open until the end of the HTTP request,
    # so that Thymeleaf templates can render lazy-loaded fields.
    # Deliberate decision for this admin application (no REST API).
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    # Suppress OSIV warning (deliberately enabled, see spring.jpa.open-in-view)
    org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor: ERROR

server:
  port: 8080

# Google Integration
google:
  sheets:
    credentials-path: google-credentials.json
  calendar:
    id: ${GOOGLE_CALENDAR_ID:}

# Static site generation
ctc:
  site:
    output-dir: docs/site

# Actuator health endpoint (for Docker health checks)
management:
  endpoints:
    web:
      exposure:
        include: health
