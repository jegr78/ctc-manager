app:
  upload-dir: uploads

spring:
  application:
    name: ctc-manager
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    # OSIV: Hibernate-Session bleibt bis zum Ende des HTTP-Requests offen,
    # damit Thymeleaf-Templates lazy-geladene Felder rendern koennen.
    # Bewusste Entscheidung fuer diese Admin-Anwendung (kein REST-API).
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    # OSIV-Warnung unterdruecken (bewusst aktiviert, siehe spring.jpa.open-in-view)
    org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor: ERROR

server:
  port: 8080

# Google Sheets Integration
google:
  sheets:
    credentials-path: ""

# Statische Seitengenerierung
ctc:
  site:
    output-dir: docs/site

# Actuator Health-Endpoint (fuer Docker Healthchecks)
management:
  endpoints:
    web:
      exposure:
        include: health
