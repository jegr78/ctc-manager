app:
  upload-dir: data/dev/uploads
  version: @project.version@
  backup:
    staging-dir: data/${spring.profiles.active:dev}/backup-staging

spring:
  application:
    name: ctc-manager
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    # OSIV: Hibernate-Session bleibt bis zum Ende des HTTP-Requests offen,
    # damit Thymeleaf-Templates lazy-geladene Felder rendern koennen.
    # Bewusste Entscheidung fuer diese Admin-Anwendung (kein REST-API).
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    # OSIV-Warnung unterdruecken (bewusst aktiviert, siehe spring.jpa.open-in-view)
    org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor: ERROR

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 104857600
    max-swallow-size: 104857600

# Google Integration
google:
  sheets:
    credentials-path: google-credentials.json
  calendar:
    id: ${GOOGLE_CALENDAR_ID:}

