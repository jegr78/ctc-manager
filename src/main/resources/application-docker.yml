server:
  port: 8080

spring:
  datasource:
    # Phase 75 RESEARCH §10: rewriteBatchedStatements=true needed for JdbcTemplate.batchUpdate(...)=500 to compile into a single multi-row INSERT on MariaDB
    url: jdbc:mariadb://db:3306/ctcdb?rewriteBatchedStatements=true
    driver-class-name: org.mariadb.jdbc.Driver
    username: ctc
    password: ctc
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration

app:
  upload-dir: /app/uploads

ctc:
  site:
    output-dir: /app/ctc-site-output

management:
  endpoint:
    health:
      show-details: always
