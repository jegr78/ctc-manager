<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTC Admin - Error</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body>
    <main class="container">
        <div class="card" id="error-card">
            <h1>
                <span th:text="${status}">500</span> &mdash; <span th:text="${error}">Error</span>
            </h1>
            <p th:if="${message}" th:text="${message}">Something went wrong</p>
            <div class="actions">
                <a href="javascript:history.back()" class="btn btn-secondary">Back</a>
                <a th:href="@{/admin/seasons}" class="btn btn-primary">Home</a>
            </div>
        </div>
    </main>
</body>
</html>
