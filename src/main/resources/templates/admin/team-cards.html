<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Team Cards', ~{::section})}">
<body>
<section>
    <h1>Team Cards</h1>
    <div class="card">
        <div class="actions" style="flex-wrap:wrap;">
            <form th:action="@{/admin/tools/team-cards}" method="get" class="btn-with-hint">
                <label for="seasonId" class="text-nowrap">Season:</label>
                <select name="seasonId" id="seasonId" onchange="this.form.submit()"
                        class="search-input" style="width:auto;">
                    <option value="" th:if="${seasons.isEmpty()}">No seasons</option>
                    <option th:each="s : ${seasons}" th:value="${s.id}" th:text="${s.displayLabel}"
                            th:selected="${s.id == selectedSeasonId}"></option>
                </select>
            </form>
            <div class="actions" style="margin-left:auto;">
                <form th:if="${season != null}" th:action="@{/admin/tools/team-cards/generate-all}" method="post" class="form-inline" style="display:flex;margin:0;" id="generateAllForm">
                    <input type="hidden" name="seasonId" th:value="${season.id}">
                    <button type="submit" id="generateAllBtn" class="btn btn-secondary">Generate All</button>
                </form>
                <a th:if="${season != null}" th:href="@{/admin/tools/team-cards/download-all(seasonId=${season.id})}"
                   class="btn btn-secondary">Download ZIP</a>
            </div>
        </div>
    </div>

    <div th:if="${season != null && cardStates != null}" class="mt-md">
        <div class="card-grid">
            <div th:each="cs : ${cardStates}" class="card card--compact">
                <div th:if="${cs.exists()}" class="mb-xs">
                    <img th:src="${cs.cardPath()}" alt="" class="card-img">
                </div>
                <div th:unless="${cs.exists()}" class="img-placeholder">
                    <span class="text-dim">Not generated</span>
                </div>
                <strong th:text="${cs.seasonTeam().team.shortName}"></strong>
                <span th:if="${cs.seasonTeam().rating != null}" class="text-dim"
                      th:text="' — Rating: ' + ${cs.seasonTeam().rating}"></span>
                <div class="actions--tight mt-xs">
                    <form th:action="@{/admin/tools/team-cards/generate/{id}(id=${cs.seasonTeam().id})}" method="post">
                        <button type="submit" class="btn btn-primary btn-sm">Generate</button>
                    </form>
                    <a th:if="${cs.exists()}"
                       th:href="@{/admin/tools/team-cards/download/{id}(id=${cs.seasonTeam().id})}"
                       class="btn btn-secondary btn-sm">Download</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${season == null}" class="card mt-md">
        <div class="empty-state empty-state--md"><p>Select a season to manage team cards.</p></div>
    </div>

    <!-- Fullscreen overlay shown during Generate All -->
    <div id="generateOverlay" class="overlay">
        <div class="overlay-panel">
            <div class="overlay-title">Generating team cards...</div>
            <div class="text-dim">Rendering cards for all teams via headless browser.<br>This may take a moment.</div>
        </div>
    </div>

    <script>
    (function() {
        var form = document.getElementById('generateAllForm');
        if (!form) return;
        var btn = document.getElementById('generateAllBtn');
        var overlay = document.getElementById('generateOverlay');
        form.addEventListener('submit', function() {
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.textContent = 'Generating...';
            overlay.style.display = 'flex';
        });
    })();
    </script>
</section>
</body>
</html>
