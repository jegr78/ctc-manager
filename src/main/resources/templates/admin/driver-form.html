<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Edit Driver', ~{::section})}">
<body>
<section>
    <h1 th:text="${driverForm.id != null ? 'Edit Driver' : 'New Driver'}"></h1>
    <div class="card">
        <form th:action="@{/admin/drivers/save}" th:object="${driverForm}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-row">
                <div class="form-group">
                    <label for="psnId">PSN ID</label>
                    <input type="text" id="psnId" th:field="*{psnId}" placeholder="e.g. AHR_Hills_93" required>
                </div>
                <div class="form-group">
                    <label for="nickname">Nickname</label>
                    <input type="text" id="nickname" th:field="*{nickname}" placeholder="e.g. AHR_Hills_93" required>
                </div>
            </div>
            <div th:if="${driverForm.id != null}" class="form-group">
                <label>PSN Aliases</label>
                <div id="aliases-container">
                    <div th:each="alias, stat : ${driverForm.aliases}" class="form-row alias-row">
                        <input type="text" th:name="'aliases[' + ${stat.index} + ']'" th:value="${alias}" class="alias-input">
                        <button type="button" class="btn btn-danger btn-xs" onclick="this.parentElement.remove()">Remove</button>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary btn-xs mt-xs" onclick="addAlias()">Add Alias</button>
                <div th:if="${#fields.hasErrors('aliases')}" class="field-error">
                    <span th:each="err : ${#fields.errors('aliases')}" th:text="${err}" class="error-message"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="form-check">
                    <input type="checkbox" id="active" th:field="*{active}">
                    <label for="active">Active</label>
                </div>
            </div>
            <div class="actions" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/drivers}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        var aliasCounter = /*[[${driverForm.aliases != null ? driverForm.aliases.size() : 0}]]*/ 0;
        function addAlias() {
            var container = document.getElementById('aliases-container');
            var index = aliasCounter++;

            var row = document.createElement('div');
            row.className = 'form-row alias-row';

            var input = document.createElement('input');
            input.type = 'text';
            input.name = 'aliases[' + index + ']';
            input.placeholder = 'e.g. OldPsnId_123';
            input.className = 'alias-input';

            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-danger btn-xs';
            btn.textContent = 'Remove';
            btn.addEventListener('click', function() { row.remove(); });

            row.appendChild(input);
            row.appendChild(btn);
            container.appendChild(row);
        }
    </script>

    <!-- Season assignments (only for existing drivers) -->
    <div th:if="${driverForm.id != null}" class="card" style="margin-top: 16px;">
        <h2>Season Assignments</h2>
        <div class="table-scroll">
            <table th:if="${seasonDrivers != null && !seasonDrivers.isEmpty()}" style="margin-bottom: 16px;">
                <thead>
                    <tr><th>Season</th><th>Team</th></tr>
                </thead>
                <tbody>
                    <tr th:each="sd : ${seasonDrivers}">
                        <td th:text="${sd.season.displayLabel}"></td>
                        <td th:text="${sd.team.shortName + ' - ' + sd.team.name}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${seasonDrivers == null || seasonDrivers.isEmpty()}" style="margin-bottom: 16px; color: #999;">
            Not assigned to any season yet.
        </div>
        <form th:action="@{/admin/drivers/{id}/assign(id=${driverForm.id})}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="seasonId">Season</label>
                    <select id="seasonId" name="seasonId" required>
                        <option value="">-- Select season --</option>
                        <option th:each="s : ${seasons}" th:value="${s.id}" th:text="${s.displayLabel}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="teamId">Team</label>
                    <select id="teamId" name="teamId" required>
                        <option value="">-- Select team --</option>
                        <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.shortName + ' - ' + t.name}"></option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-success btn-sm">Save Assignment</button>
        </form>
    </div>
</section>
</body>
</html>
