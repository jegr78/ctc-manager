<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Team: ' + ${team.shortName}, ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <div>
            <a th:href="@{/admin/teams}" class="back-link">&larr; Back to Teams</a>
            <h1 th:text="${team.name}"></h1>
        </div>
        <div class="actions">
            <a th:href="@{/admin/teams/{id}/edit(id=${team.id})}" class="btn btn-primary">Edit</a>
            <form th:action="@{/admin/teams/{id}/delete(id=${team.id})}" method="post"
                  onsubmit="return confirm('Really delete this team?')">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="detail-fields">
            <span class="label">Name</span>
            <span th:text="${team.name}"></span>
            <span class="label">Short Name</span>
            <span th:text="${team.shortName}"></span>
            <span class="label">Logo</span>
            <span th:text="${team.logoUrl ?: '-'}"></span>
            <span class="label">Parent Team</span>
            <span th:if="${team.parentTeam != null}">
                <a th:href="@{/admin/teams/{id}(id=${team.parentTeam.id})}" class="detail-link" th:text="${team.parentTeam.name}"></a>
            </span>
            <span th:if="${team.parentTeam == null}">-</span>
        </div>

        <div th:if="${team.hasSubTeams()}" class="detail-section">
            <h2 th:text="'Sub-Teams (' + ${team.subTeams.size()} + ')'"></h2>
            <div th:if="${!team.subTeams.isEmpty()}" class="chip-list">
                <a th:each="sub : ${team.subTeams}" th:href="@{/admin/teams/{id}(id=${sub.id})}" class="chip"
                   th:text="${sub.shortName + ' — ' + sub.name}"></a>
            </div>
        </div>

        <div class="detail-section" style="margin-top:32px;">
            <h2>Seasons &amp; Drivers</h2>
            <div th:if="${seasonDriverGroups.isEmpty() && seasons.isEmpty()}" class="empty-state" style="padding:16px;">
                <p>Not assigned to any season.</p>
            </div>
            <div th:if="${!seasons.isEmpty() && seasonDriverGroups.isEmpty()}" class="empty-state" style="padding:16px;">
                <p>Assigned to
                    <span th:text="${seasons.size()}"></span> season(s) but no drivers assigned yet.
                </p>
                <div class="chip-list" style="margin-top:8px;">
                    <a th:each="s : ${seasons}" th:href="@{/admin/seasons/{id}(id=${s.id})}" class="chip">
                        <span th:text="${s.name}"></span>
                        <span th:if="${s.active}" class="badge badge-active" style="margin-left:6px;font-size:11px;">Active</span>
                    </a>
                </div>
            </div>
            <div th:each="group : ${seasonDriverGroups}">
                <details class="season-accordion" th:open="${group.season.active}">
                    <summary class="season-header">
                        <span class="season-header-title" th:text="${group.season.displayLabel}"></span>
                        <span th:if="${group.season.active}" class="badge badge-active" style="margin-left:6px;font-size:11px;">Active</span>
                        <span class="text-dim" th:text="'(' + ${group.totalDriverCount()} + ' Drivers)'"></span>
                    </summary>
                    <div class="season-drivers">
                        <div th:each="entry : ${group.driversByTeam}" class="team-driver-group">
                            <div class="team-group-label">
                                <a th:href="@{/admin/teams/{id}(id=${entry.key.id})}" th:text="${entry.key.shortName}"></a>
                                <span th:if="${entry.key.isSubTeam()}" class="badge badge-sub">Sub</span>
                            </div>
                            <div class="chip-list">
                                <a th:each="driver : ${entry.value}"
                                   th:href="@{/admin/drivers/{id}(id=${driver.id})}"
                                   class="chip"
                                   th:text="${driver.psnId}"></a>
                            </div>
                        </div>
                    </div>
                </details>
            </div>
            <!-- Seasons ohne Fahrer -->
            <div th:each="s : ${seasonsWithoutDrivers}">
                <details class="season-accordion">
                    <summary class="season-header">
                        <a th:href="@{/admin/seasons/{id}(id=${s.id})}" th:text="${s.displayLabel}" class="season-header-title"></a>
                        <span class="text-dim">(0 Drivers)</span>
                    </summary>
                </details>
            </div>
        </div>
    </div>
</section>
</body>
</html>
