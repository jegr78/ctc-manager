<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('GT7 Sync', ~{::section})}">
<body>
<section>
    <h1>GT7 Sync</h1>
    <div class="card">
        <p>Fetch the current GT7 car and track lists from <strong>gran-turismo.com</strong> and compare with the database.</p>
        <p class="text-dim" style="margin-top:8px;">This will scrape the official GT7 car list and track list pages, compare the data with existing entries, and show you what's new.</p>
        <form th:action="@{/admin/gt7-sync/preview}" method="post" style="margin-top:16px;">
            <button type="submit" class="btn btn-primary">Fetch &amp; Compare</button>
        </form>
    </div>
</section>
</body>
</html>
