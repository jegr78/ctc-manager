<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Edit Season', ~{::section})}">
<body>
<section>
    <h1 th:text="${season.id != null ? 'Edit Season' : 'New Season'}"></h1>
    <div class="card">
        <form th:action="@{/admin/seasons/save}" th:object="${season}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. 2026" required>
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="form-group">
                    <div class="form-check" style="margin-top:24px;">
                        <input type="checkbox" id="active" th:field="*{active}">
                        <label for="active">Active Season</label>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" name="startDate" th:value="${season.startDate != null ? season.startDate.toString() : ''}">
                </div>
                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" name="endDate" th:value="${season.endDate != null ? season.endDate.toString() : ''}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="format">Format</label>
                    <select id="format" th:field="*{format}">
                        <option value="LEAGUE">League</option>
                        <option value="SWISS">Swiss</option>
                    </select>
                </div>
                <div class="form-group" id="totalRoundsGroup">
                    <label for="totalRounds">Total Rounds</label>
                    <input type="number" id="totalRounds" th:field="*{totalRounds}" min="1" max="20" placeholder="e.g. 8">
                </div>
            </div>
            <script>
            (function() {
                var fmt = document.getElementById('format');
                var trg = document.getElementById('totalRoundsGroup');
                function toggle() { trg.style.display = fmt.value === 'SWISS' ? '' : 'none'; }
                fmt.addEventListener('change', toggle);
                toggle();
            })();
            </script>

            <!-- Scoring -->
            <div style="border:1px solid var(--accent); border-radius:var(--radius-md); padding:16px; margin-top:16px; background:rgba(79,195,247,0.03);">
                <h3 style="color:var(--accent); margin-bottom:12px;">Scoring</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="raceScoring">Race-Scoring *</label>
                        <select id="raceScoring" name="raceScoring" required>
                            <option value="">-- Select --</option>
                            <option th:each="rs : ${allRaceScorings}" th:value="${rs.id}"
                                    th:text="${rs.name}"
                                    th:selected="${season.raceScoring != null && season.raceScoring.id == rs.id}"></option>
                        </select>
                        <div th:if="${season.raceScoring != null}" class="text-dim" style="font-size:11px; margin-top:2px;"
                             th:text="${season.raceScoring.racePoints + (season.raceScoring.qualiPoints != null ? ' · Quali ' + season.raceScoring.qualiPoints : '') + ' · FL ' + season.raceScoring.fastestLapPoints}"></div>
                    </div>
                    <div class="form-group">
                        <label for="matchScoring">Match-Scoring *</label>
                        <select id="matchScoring" name="matchScoring" required>
                            <option value="">-- Select --</option>
                            <option th:each="ms : ${allMatchScorings}" th:value="${ms.id}"
                                    th:text="${ms.name}"
                                    th:selected="${season.matchScoring != null && season.matchScoring.id == ms.id}"></option>
                        </select>
                        <div th:if="${season.matchScoring != null}" class="text-dim" style="font-size:11px; margin-top:2px;"
                             th:text="'S ' + ${season.matchScoring.pointsWin} + ' · U ' + ${season.matchScoring.pointsDraw} + ' · N ' + ${season.matchScoring.pointsLoss}"></div>
                    </div>
                </div>
                <div class="form-group" style="max-width:200px;">
                    <label for="legs">Legs per Match</label>
                    <input type="number" id="legs" th:field="*{legs}" min="1" value="1">
                </div>
            </div>

            <div class="actions" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/seasons}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <!-- Team assignment (only when editing) -->
    <div th:if="${season.id != null}" class="card">
        <h2>Teams in this Season</h2>
        <table th:if="${!season.teams.isEmpty()}">
            <thead>
                <tr><th>Short Name</th><th>Name</th><th>Type</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="team : ${season.teams}">
                    <td><strong th:text="${team.shortName}"></strong></td>
                    <td th:text="${team.name}"></td>
                    <td>
                        <span th:if="${team.subTeam}" class="badge badge-inactive"
                              th:text="'Sub → ' + ${team.parentOrSelf.shortName}"></span>
                        <span th:unless="${team.subTeam}" class="badge badge-active">Parent</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/seasons/{id}/remove-team(id=${season.id})}" method="post">
                            <input type="hidden" name="teamId" th:value="${team.id}">
                            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${season.teams.isEmpty()}" class="empty-state" style="padding:24px;">
            <p>No teams assigned yet.</p>
        </div>
        <form th:action="@{/admin/seasons/{id}/add-team(id=${season.id})}" method="post"
              style="margin-top:16px;display:flex;gap:8px;align-items:center;">
            <select name="teamId" required>
                <option value="">-- Add team --</option>
                <option th:each="t : ${allTeams}" th:value="${t.id}"
                        th:text="${t.shortName + ' — ' + t.name + (t.subTeam ? ' (Sub of ' + t.parentOrSelf.shortName + ')' : '')}"
                        th:if="${!season.teams.contains(t)}"></option>
            </select>
            <button type="submit" class="btn btn-primary btn-sm">Add</button>
        </form>
    </div>

    <!-- Car Pool (only when editing) -->
    <div th:if="${season.id != null}" class="card" style="margin-top: 16px;" id="carPool">
        <h2 th:text="'Car Pool (' + ${season.cars.size()} + ')'">Car Pool</h2>
        <div class="transfer-picker">
            <div class="transfer-list">
                <form th:action="@{/admin/seasons/{id}/cars/add(id=${season.id})}" method="post" id="addCarsForm">
                    <div class="transfer-header">
                        <span class="text-dim">Available</span>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <input type="text" id="availableCarsFilter" placeholder="Filter..." class="transfer-filter">
                            <button type="submit" class="btn btn-primary btn-sm" title="Add selected">&rarr;</button>
                        </div>
                    </div>
                    <div class="transfer-items" id="availableCars">
                        <label th:each="car : ${allCars}" th:if="${!season.cars.contains(car)}" class="transfer-item transfer-selectable">
                            <input type="checkbox" name="carIds" th:value="${car.id}">
                            <span th:text="${car.manufacturer + ' — ' + car.name}"></span>
                        </label>
                        <div th:if="${allCars.isEmpty()}" class="transfer-empty">No cars available. Create cars first.</div>
                    </div>
                </form>
            </div>
            <div class="transfer-list">
                <form th:action="@{/admin/seasons/{id}/cars/remove(id=${season.id})}" method="post" id="removeCarsForm">
                    <div class="transfer-header">
                        <span class="text-dim" th:text="'Assigned (' + ${season.cars.size()} + ')'">Assigned</span>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <input type="text" id="assignedCarsFilter" placeholder="Filter..." class="transfer-filter">
                            <button type="submit" class="btn btn-danger btn-sm" title="Remove selected">&larr;</button>
                        </div>
                    </div>
                    <div class="transfer-items" id="assignedCars">
                        <label th:each="car : ${season.cars}" class="transfer-item transfer-selectable">
                            <input type="checkbox" name="carIds" th:value="${car.id}">
                            <span th:text="${car.manufacturer + ' — ' + car.name}"></span>
                        </label>
                        <div th:if="${season.cars.isEmpty()}" class="transfer-empty">No cars assigned yet.</div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Track Pool (only when editing) -->
    <div th:if="${season.id != null}" class="card" style="margin-top: 16px;" id="trackPool">
        <h2 th:text="'Track Pool (' + ${season.tracks.size()} + ')'">Track Pool</h2>
        <div class="transfer-picker">
            <div class="transfer-list">
                <form th:action="@{/admin/seasons/{id}/tracks/add(id=${season.id})}" method="post" id="addTracksForm">
                    <div class="transfer-header">
                        <span class="text-dim">Available</span>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <input type="text" id="availableTracksFilter" placeholder="Filter..." class="transfer-filter">
                            <button type="submit" class="btn btn-primary btn-sm" title="Add selected">&rarr;</button>
                        </div>
                    </div>
                    <div class="transfer-items" id="availableTracks">
                        <label th:each="track : ${allTracks}" th:if="${!season.tracks.contains(track)}" class="transfer-item transfer-selectable">
                            <input type="checkbox" name="trackIds" th:value="${track.id}">
                            <span th:text="${track.name}"></span>
                        </label>
                        <div th:if="${allTracks.isEmpty()}" class="transfer-empty">No tracks available. Create tracks first.</div>
                    </div>
                </form>
            </div>
            <div class="transfer-list">
                <form th:action="@{/admin/seasons/{id}/tracks/remove(id=${season.id})}" method="post" id="removeTracksForm">
                    <div class="transfer-header">
                        <span class="text-dim" th:text="'Assigned (' + ${season.tracks.size()} + ')'">Assigned</span>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <input type="text" id="assignedTracksFilter" placeholder="Filter..." class="transfer-filter">
                            <button type="submit" class="btn btn-danger btn-sm" title="Remove selected">&larr;</button>
                        </div>
                    </div>
                    <div class="transfer-items" id="assignedTracks">
                        <label th:each="track : ${season.tracks}" class="transfer-item transfer-selectable">
                            <input type="checkbox" name="trackIds" th:value="${track.id}">
                            <span th:text="${track.name}"></span>
                        </label>
                        <div th:if="${season.tracks.isEmpty()}" class="transfer-empty">No tracks assigned yet.</div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
    (function() {
        function setupFilter(inputId, containerId) {
            var input = document.getElementById(inputId);
            var container = document.getElementById(containerId);
            if (!input || !container) return;
            input.addEventListener('input', function() {
                var q = this.value.toLowerCase();
                container.querySelectorAll('.transfer-item').forEach(function(item) {
                    item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
                });
            });
        }
        setupFilter('availableCarsFilter', 'availableCars');
        setupFilter('assignedCarsFilter', 'assignedCars');
        setupFilter('availableTracksFilter', 'availableTracks');
        setupFilter('assignedTracksFilter', 'assignedTracks');

        // Prevent submit if no checkboxes selected
        document.querySelectorAll('#addCarsForm, #removeCarsForm, #addTracksForm, #removeTracksForm').forEach(function(form) {
            form.addEventListener('submit', function(e) {
                if (!form.querySelector('input[type="checkbox"]:checked')) {
                    e.preventDefault();
                }
            });
        });
    })();
    </script>
</section>
</body>
</html>
