<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Edit Car', ~{::section})}">
<body>
<section>
    <h1 th:text="${carForm.id != null ? 'Edit Car' : 'New Car'}"></h1>
    <div class="card">
        <form th:action="@{/admin/cars/save}" th:object="${carForm}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-row">
                <div class="form-group">
                    <label for="manufacturer">Manufacturer</label>
                    <input type="text" id="manufacturer" th:field="*{manufacturer}" placeholder="e.g. Mazda" required>
                    <span class="field-error" th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}"></span>
                </div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. RX-Vision GT3 Concept" required>
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
            </div>
            <div class="actions mt-md">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/cars}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
    <div th:if="${carForm.id != null}" class="card mt-md">
        <h2>Image</h2>
        <div th:if="${car != null && car.imageUrl != null}" class="mb-sm">
            <img th:src="${car.imageUrl}" alt="" class="preview-img">
        </div>
        <div th:if="${car == null || car.imageUrl == null}" class="empty-state empty-state--compact"><p>No image yet.</p></div>
        <form th:action="@{/admin/cars/{id}/image(id=${carForm.id})}" method="post" enctype="multipart/form-data" class="mt-xs">
            <div class="inline-form">
                <div class="form-group form-group--inline">
                    <input type="file" name="image" accept="image/png,image/jpeg,image/webp,image/gif" required
                           class="file-input">
                    <small class="form-hint">PNG, JPG, WebP, GIF. Max 10 MB.</small>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Upload</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
