<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Edit Team', ~{::section})}">
<body>
<section>
    <h1 th:text="${teamForm.id != null ? 'Edit Team' : 'New Team'}"></h1>
    <div class="card">
        <form th:action="@{/admin/teams/save}" th:object="${teamForm}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. Community League Racing" required>
                </div>
                <div class="form-group">
                    <label for="shortName">Short Name</label>
                    <input type="text" id="shortName" th:field="*{shortName}" placeholder="e.g. CLR" required>
                </div>
            </div>
            <div th:if="${team != null && team.parentTeam != null}" class="form-group">
                <label>Parent Team</label>
                <input type="text" th:value="${team.parentTeam.shortName + ' — ' + team.parentTeam.name}" disabled
                       style="background:var(--bg);color:var(--text-dim);">
            </div>

            <!-- Discord Role (cache-warm dropdown / cache-empty plain-text fallback) -->
            <div th:if="${discordRoles != null && !discordRoles.isEmpty()}" class="form-group mt-md">
                <label for="discordRoleSearch">Discord Role</label>
                <div class="searchable-dropdown" id="discordRoleDropdown"
                     data-testid="discord-role-dropdown">
                    <input type="text" id="discordRoleSearch" placeholder="Search roles..."
                           autocomplete="off" class="dropdown-input">
                    <input type="hidden" th:field="*{discordRoleId}">
                    <div class="dropdown-list" id="discordRoleList">
                        <div th:each="role : ${discordRoles.values()}"
                             class="dropdown-item"
                             th:attr="data-id=${role.id()},data-label=${role.name()}"
                             th:text="${role.name()}">
                        </div>
                    </div>
                </div>
                <span th:errors="*{discordRoleId}" class="error-badge error-badge--auth"></span>
            </div>
            <div th:if="${discordRoles == null || discordRoles.isEmpty()}" class="form-group mt-md">
                <label for="discordRoleId">Discord Role ID</label>
                <input type="text" id="discordRoleId" th:field="*{discordRoleId}"
                       data-testid="discord-role-input"
                       pattern="^\d{17,20}$"
                       placeholder="Discord role snowflake (17-20 digits)">
                <span class="badge-warning">
                    Role cache empty —
                    <a th:href="@{/admin/discord-config}">configure Discord &amp; refresh roles</a>
                    to use a dropdown.
                </span>
                <span th:errors="*{discordRoleId}" class="error-badge error-badge--auth"></span>
            </div>

            <!-- Brand Colors (inline, only when editing) -->
            <div th:if="${teamForm.id != null}" class="mt-xl">
                <h3>Brand Colors</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Primary Color</label>
                        <div class="color-pair">
                            <input type="color" th:value="${teamForm.primaryColor ?: '#333333'}"
                                   class="color-picker-input--lg">
                            <input type="text" th:field="*{primaryColor}" placeholder="#333333"
                                   pattern="#[0-9a-fA-F]{6}" maxlength="7" class="color-text-input--sm">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Secondary Color</label>
                        <div class="color-pair">
                            <input type="color" th:value="${teamForm.secondaryColor ?: '#555555'}"
                                   class="color-picker-input--lg">
                            <input type="text" th:field="*{secondaryColor}" placeholder="#555555"
                                   pattern="#[0-9a-fA-F]{6}" maxlength="7" class="color-text-input--sm">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Accent Color</label>
                        <div class="color-pair">
                            <input type="color" th:value="${teamForm.accentColor ?: '#4fc3f7'}"
                                   class="color-picker-input--lg">
                            <input type="text" th:field="*{accentColor}" placeholder="#4fc3f7"
                                   pattern="#[0-9a-fA-F]{6}" maxlength="7" class="color-text-input--sm">
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions mt-md">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/teams}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <!-- Logo Upload (only when editing) -->
    <div th:if="${teamForm.id != null}" class="card mt-md">
        <h2>Logo</h2>
        <div th:if="${team.logoUrl != null}" class="mb-sm">
            <img th:src="${team.logoUrl}" alt="" class="logo-preview">
        </div>
        <div th:if="${team.logoUrl == null}" class="empty-state empty-state--compact"><p>No logo yet.</p></div>
        <form th:action="@{/admin/teams/{id}/logo(id=${team.id})}" method="post" enctype="multipart/form-data" class="mt-xs">
            <div class="inline-form">
                <div class="form-group form-group--inline">
                    <input type="file" name="logo" accept="image/png,image/jpeg,image/webp,image/gif" required
                           class="file-input">
                    <small class="form-hint">PNG, JPG, WebP, GIF. Max 10 MB.</small>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Upload</button>
            </div>
        </form>
    </div>

    <!-- Sub-Teams section (only for parent teams when editing) -->
    <div th:if="${teamForm.id != null && (team == null || team.parentTeam == null)}" class="card">
        <h2>Sub-Teams</h2>
        <table th:if="${!team.subTeams.isEmpty()}">
            <thead>
                <tr><th>Short Name</th><th>Name</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="sub : ${team.subTeams}">
                    <td><strong th:text="${sub.shortName}"></strong></td>
                    <td th:text="${sub.name}"></td>
                    <td>
                        <form th:action="@{/admin/teams/{id}/remove-sub-team(id=${team.id})}" method="post"
                              onsubmit="return confirm('Remove this sub-team?')">
                            <input type="hidden" name="subTeamId" th:value="${sub.id}">
                            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${team.subTeams.isEmpty()}" class="empty-state empty-state--md">
            <p>No sub-teams. This team competes directly.</p>
        </div>
        <form th:action="@{/admin/teams/{id}/add-sub-team(id=${team.id})}" method="post"
              class="inline-form mt-md">
            <input type="text" name="subShortName" placeholder="Short name (e.g. CLR1)" required
                   class="search-input" style="width:120px;">
            <input type="text" name="subName" placeholder="Full name (e.g. CLR 1)" required
                   class="search-input" style="width:200px;">
            <button type="submit" class="btn btn-primary btn-sm">Add Sub-Team</button>
        </form>
    </div>
</section>
</body>
</html>
