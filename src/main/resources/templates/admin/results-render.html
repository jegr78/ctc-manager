<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px; overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif; color: #fff;
            display: flex; flex-direction: column;
        }

        .header, .footer {
            background: linear-gradient(180deg, #202028 0%, #121217 100%);
            padding: 18px 90px; display: flex; justify-content: space-between;
            align-items: center; min-height: 112px;
        }
        .header { box-shadow: inset 0 -3px 0 rgba(245,197,66,.78); }
        .footer { box-shadow: inset 0 3px 0 rgba(245,197,66,.78); }

        .header-left { text-align: left; flex: 1; }
        .header-left .title { font-size: 27px; font-weight: 900; color: #f2f2f5; text-transform: uppercase; letter-spacing: 3px; line-height: 1.1; }
        .header-left .year { font-size: 29px; font-weight: 700; color: #9a9aa6; margin-top: 6px; }

        .header-center { text-align: center; flex: 1; }
        .header-center .scorecard-title { font-size: 50px; font-weight: 900; color: #f2f2f5; letter-spacing: 2px;
            white-space: nowrap; display: inline-flex; align-items: center; gap: 18px; }
        .header-center .scorecard-title::before, .header-center .scorecard-title::after {
            content: ''; width: 4px; height: 38px; background: #f5c542; display: inline-block; border-radius: 1px; }
        .header-center .matchday { font-size: 29px; font-weight: 700; color: #9a9aa6; margin-top: 2px; }

        .header-right { flex: 1; display: flex; justify-content: flex-end; }
        .header-right img { width: 80px; height: 80px; object-fit: contain; }

        .main {
            flex: 1; position: relative; display: flex; align-items: stretch; padding: 20px 32px; gap: 24px;
            background:
                repeating-linear-gradient(118deg, transparent 0 74px, rgba(255,255,255,.013) 74px 76px),
                radial-gradient(120% 85% at 50% 36%, #15151b 0%, #0d0d11 54%, #08080b 100%);
        }

        .team-card-container { width: 18%; display: flex; align-items: center; justify-content: center; }
        .team-card-container img { max-height: 100%; max-width: 100%; object-fit: contain;
            border: 3px solid #fff; border-radius: 16px; box-shadow: 0 0 0 1px rgba(0,0,0,.45), 0 16px 44px rgba(0,0,0,.55); }

        /* Fahrer-Zeilen + HUD-Eckbrackets */
        .results { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: space-around; padding: 24px 44px; }
        .results::before, .results::after { content: ''; position: absolute; width: 36px; height: 36px; border: 3px solid rgba(245,197,66,.55); }
        .results::before { top: 0; left: 8px; border-right: 0; border-bottom: 0; }
        .results::after { bottom: 0; right: 8px; border-left: 0; border-top: 0; }
        .result-row { display: flex; align-items: center; padding: 8px 20px; border-bottom: 1px solid rgba(255,255,255,.055); }
        .result-row:last-child { border-bottom: 0; }
        .driver-info { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .driver-info.home { align-items: flex-start; }
        .driver-info.away { align-items: flex-end; }
        .driver-name { font-size: 26px; font-weight: 700; color: #d4d4da; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .driver-nickname { font-size: 18px; font-weight: 600; color: #7e7e88; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .points { font-size: 30px; font-weight: 700; color: #e6e6ec; width: 66px; text-align: center; font-variant-numeric: tabular-nums; }
        .points.winner { color: #f5c542; }

        .empty-slot { opacity: 0.32; }
        .empty-slot .driver-name { color: #6a6a73; }

        .footer .team-total { flex: 1; font-size: 56px; font-weight: 900; color: #f2f2f5; }
        .footer .team-total.winner { text-decoration: underline; text-decoration-color: #f5c542; text-underline-offset: 12px; text-decoration-thickness: 6px; }
        .footer .team-total:last-child { text-align: right; }
        .footer .season-name { flex: 1; text-align: center; font-size: 42px; font-weight: 700; color: #9a9aa6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="title">Community<br>Team Cup</div>
            <div class="year" th:text="${seasonYear}"></div>
        </div>
        <div class="header-center">
            <div class="scorecard-title">Scorecard</div>
            <div class="matchday" th:text="${matchdayName}"></div>
        </div>
        <div class="header-right">
            <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="CTC">
        </div>
    </div>

    <div class="main">
        <div class="team-card-container">
            <img th:src="${homeCardBase64}" alt="Home Team Card">
        </div>

        <div class="results">
            <div class="result-row" th:each="row : ${resultRows}">
                <div class="driver-info home" th:classappend="${row.homeDriver == 'n/a'} ? 'empty-slot' : ''">
                    <span class="driver-name" th:text="${row.homeDriver}"></span>
                    <span class="driver-nickname" th:text="'(' + ${row.homeNickname} + ')'" th:if="${row.homeDriver != 'n/a'}"></span>
                </div>
                <span class="points" th:classappend="${(row.homeDriver != 'n/a' and homeIsWinner ? 'winner ' : '') + (row.homeDriver == 'n/a' ? 'empty-slot' : '')}" th:text="${row.homeDriver != 'n/a' ? row.homePoints : 0}"></span>
                <span class="points" th:classappend="${(row.awayDriver != 'n/a' and awayIsWinner ? 'winner ' : '') + (row.awayDriver == 'n/a' ? 'empty-slot' : '')}" th:text="${row.awayDriver != 'n/a' ? row.awayPoints : 0}"></span>
                <div class="driver-info away" th:classappend="${row.awayDriver == 'n/a'} ? 'empty-slot' : ''">
                    <span class="driver-name" th:text="${row.awayDriver}"></span>
                    <span class="driver-nickname" th:text="'(' + ${row.awayNickname} + ')'" th:if="${row.awayDriver != 'n/a'}"></span>
                </div>
            </div>
        </div>

        <div class="team-card-container">
            <img th:src="${awayCardBase64}" alt="Away Team Card">
        </div>
    </div>

    <div class="footer">
        <div class="team-total" th:classappend="${homeIsWinner ? 'winner' : ''}" th:text="${homeTotal}"></div>
        <div class="season-name" th:text="${seasonName}"></div>
        <div class="team-total" th:classappend="${awayIsWinner ? 'winner' : ''}" th:text="${awayTotal}"></div>
    </div>
</body>
</html>
