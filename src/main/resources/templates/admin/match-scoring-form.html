<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(${scoring.id != null ? 'Match-Scoring bearbeiten' : 'Neues Match-Scoring'}, ~{::section})}">
<body>
<section>
    <a th:href="@{/admin/match-scorings}" class="back-link">&larr; Zurueck</a>
    <h1 th:text="${scoring.id != null ? 'Match-Scoring bearbeiten' : 'Neues Match-Scoring'}"></h1>

    <form th:action="@{/admin/match-scorings/save}" method="post">
        <input type="hidden" name="id" th:value="${scoring.id}">

        <div class="card">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" th:value="${scoring.name}" required>
            </div>

            <div class="form-row" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group">
                    <label for="pointsWin" style="color:#66bb6a;">Sieg</label>
                    <input type="number" id="pointsWin" name="pointsWin" th:value="${scoring.pointsWin}"
                           min="0" required style="text-align:center; font-size:18px; font-weight:700;">
                </div>
                <div class="form-group">
                    <label for="pointsDraw">Unentschieden</label>
                    <input type="number" id="pointsDraw" name="pointsDraw" th:value="${scoring.pointsDraw}"
                           min="0" required style="text-align:center; font-size:18px; font-weight:700;">
                </div>
                <div class="form-group">
                    <label for="pointsLoss" style="color:#ef5350;">Niederlage</label>
                    <input type="number" id="pointsLoss" name="pointsLoss" th:value="${scoring.pointsLoss}"
                           min="0" required style="text-align:center; font-size:18px; font-weight:700;">
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-top:16px;">
                <button type="submit" class="btn btn-primary">Speichern</button>
                <a th:href="@{/admin/match-scorings}" class="btn btn-secondary">Abbrechen</a>
            </div>
        </div>
    </form>
</section>
</body>
</html>
