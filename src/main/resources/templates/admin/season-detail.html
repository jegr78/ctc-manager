<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Season: ' + ${season.name}, ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <div>
            <a th:href="@{/admin/seasons}" class="back-link">&larr; Back to Seasons</a>
            <h1 th:text="${season.name}"></h1>
        </div>
        <div class="actions">
            <a th:if="${season.format.name() == 'SWISS'}" th:href="@{/admin/seasons/{id}/swiss(id=${season.id})}" class="btn btn-secondary">Swiss Rounds</a>
            <a th:href="@{/admin/seasons/{id}/edit(id=${season.id})}" class="btn btn-primary">Edit</a>
            <form th:action="@{/admin/seasons/{id}/delete(id=${season.id})}" method="post"
                  onsubmit="return confirm('Really delete this season?')">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="detail-fields">
            <span class="label">Name</span>
            <span th:text="${season.name}"></span>
            <span class="label">Start Date</span>
            <span th:text="${season.startDate ?: '-'}"></span>
            <span class="label">End Date</span>
            <span th:text="${season.endDate ?: '-'}"></span>
            <span class="label">Status</span>
            <span>
                <span th:if="${season.active}" class="badge badge-active">● Active</span>
                <span th:unless="${season.active}" class="badge badge-inactive">○ Inactive</span>
            </span>
        </div>

        <div class="detail-section">
            <h2 th:text="'Teams (' + ${season.teams.size()} + ')'"></h2>
            <div th:if="${!season.teams.isEmpty()}" class="chip-list">
                <a th:each="team : ${season.teams}" th:href="@{/admin/teams/{id}(id=${team.id})}" class="chip">
                    <span th:text="${team.shortName + ' — ' + team.name}"></span>
                    <span th:if="${team.isSubTeam()}" class="badge badge-active" style="margin-left:6px;font-size:11px;">Sub</span>
                </a>
            </div>
            <div th:if="${season.teams.isEmpty()}" class="empty-state" style="padding:16px;"><p>No teams assigned.</p></div>
            <div th:if="${!season.seasonTeams.isEmpty()}" style="margin-top:16px;">
                <h3>Ratings</h3>
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
                    <div th:each="st : ${season.seasonTeams}" style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg-hover);border-radius:6px;">
                        <div th:if="${st.effectivePrimaryColor != null}" style="display:flex;gap:2px;margin-right:2px;">
                            <span th:style="'display:inline-block;width:10px;height:10px;border-radius:2px;background:' + ${st.effectivePrimaryColor}"></span>
                            <span th:style="'display:inline-block;width:10px;height:10px;border-radius:2px;background:' + ${st.effectiveSecondaryColor}"></span>
                            <span th:style="'display:inline-block;width:10px;height:10px;border-radius:2px;background:' + ${st.effectiveAccentColor}"></span>
                        </div>
                        <a th:href="@{/admin/teams/{id}(id=${st.team.id})}" th:text="${st.team.shortName}" style="color:var(--white);font-weight:500;font-size:13px;text-decoration:none;"></a>
                        <form th:action="@{/admin/seasons/{id}/update-rating(id=${season.id})}" method="post"
                              style="display:flex;gap:3px;align-items:center;margin:0;">
                            <input type="hidden" name="seasonTeamId" th:value="${st.id}">
                            <input type="number" name="rating" th:value="${st.rating}" min="0" max="99" placeholder="—"
                                   style="width:44px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg-input);color:var(--white);font-size:12px;text-align:center;">
                            <button type="submit" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px;">&#10003;</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="detail-section" style="margin-top:32px;">
            <h2 th:text="'Car Pool (' + ${season.cars.size()} + ')'"></h2>
            <div th:if="${!season.cars.isEmpty()}" class="chip-list">
                <span th:each="car : ${season.cars}" class="chip"
                      th:text="${car.manufacturer + ' — ' + car.name}"></span>
            </div>
            <div th:if="${season.cars.isEmpty()}" class="empty-state" style="padding:16px;"><p>No cars assigned. <a th:href="@{/admin/seasons/{id}/edit(id=${season.id})}" class="detail-link">Edit season</a> to add cars.</p></div>
        </div>

        <div class="detail-section" style="margin-top:32px;">
            <h2 th:text="'Track Pool (' + ${season.tracks.size()} + ')'"></h2>
            <div th:if="${!season.tracks.isEmpty()}" class="chip-list">
                <span th:each="track : ${season.tracks}" class="chip">
                    <span th:text="${track.name}"></span>
                    <span th:if="${track.country}" class="text-dim" th:text="' (' + ${track.country} + ')'"></span>
                </span>
            </div>
            <div th:if="${season.tracks.isEmpty()}" class="empty-state" style="padding:16px;"><p>No tracks assigned. <a th:href="@{/admin/seasons/{id}/edit(id=${season.id})}" class="detail-link">Edit season</a> to add tracks.</p></div>
        </div>

        <div class="detail-section" style="margin-top:32px;">
            <h2 th:text="'Matchdays (' + ${season.matchdays.size()} + ')'"></h2>
            <div class="table-scroll">
                <table th:if="${!season.matchdays.isEmpty()}">
                    <thead>
                        <tr><th>#</th><th>Label</th><th>Races</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="md : ${season.matchdays}">
                            <td th:text="${md.sortIndex}"></td>
                            <td><a th:href="@{/admin/matchdays/{id}(id=${md.id})}" class="detail-link" th:text="${md.label}"></a></td>
                            <td th:text="${md.races.size()}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${season.matchdays.isEmpty()}" class="empty-state" style="padding:16px;"><p>No matchdays yet.</p></div>
        </div>

        <div th:if="${playoff != null}" class="detail-section" style="margin-top:32px;">
            <h2>Playoff</h2>
            <div class="detail-fields">
                <span class="label">Name</span>
                <a th:href="@{/admin/playoffs(seasonId=${season.id})}" class="detail-link" th:text="${playoff.name}"></a>
                <span class="label">Rounds</span>
                <span th:text="${playoff.rounds.size()}"></span>
            </div>
        </div>
    </div>
</section>
</body>
</html>
