<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Spieltag bearbeiten', ~{::section})}">
<body>
<section>
    <h1 th:text="${matchday.id != null ? 'Spieltag bearbeiten' : 'Neuer Spieltag'}"></h1>
    <div class="card">
        <form th:action="@{/admin/matchdays/save}" th:object="${matchday}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" name="seasonId" th:value="${matchday.season != null ? matchday.season.id : ''}">
            <div class="form-group" th:if="${matchday.season == null}">
                <label for="seasonSelect">Saison</label>
                <select id="seasonSelect" name="seasonId" required>
                    <option value="">-- Saison wählen --</option>
                    <option th:each="s : ${seasons}" th:value="${s.id}" th:text="${s.name}"></option>
                </select>
            </div>
            <div th:if="${matchday.season != null}" style="margin-bottom: 16px; color: #666;">
                Saison: <strong th:text="${matchday.season.name}"></strong>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="label">Bezeichnung</label>
                    <input type="text" id="label" th:field="*{label}" placeholder="z.B. Spieltag 1, Playoff Halbfinale" required>
                </div>
                <div class="form-group">
                    <label for="sortIndex">Sortierung</label>
                    <input type="number" id="sortIndex" th:field="*{sortIndex}" min="0" required>
                </div>
            </div>
            <div class="form-group">
                <label for="date">Datum</label>
                <input type="date" id="date" th:field="*{date}">
            </div>
            <div class="actions" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary">Speichern</button>
                <a th:href="@{/admin/matchdays}" class="btn btn-secondary">Abbrechen</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
