<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Create Playoff', ~{::section})}">
<body>
<section>
    <h1>New Playoff</h1>
    <div class="card">
        <form th:action="@{/admin/playoffs/save}" th:object="${playoffForm}" method="post">
            <div class="form-group">
                <label for="seasonId">Season</label>
                <select id="seasonId" th:field="*{seasonId}" required>
                    <option value="">-- Select season --</option>
                    <option th:each="s : ${seasons}" th:value="${s.id}" th:text="${s.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" th:field="*{name}" required placeholder="e.g. CTC 5 Playoffs">
            </div>
            <div class="form-group">
                <label for="numberOfTeams">Number of Teams</label>
                <select id="numberOfTeams" th:field="*{numberOfTeams}">
                    <option value="4">4 Teams (SF + Final)</option>
                    <option value="8" selected>8 Teams (QF + SF + Final)</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" name="startDate" th:value="${playoffForm.startDate != null ? playoffForm.startDate.toString() : ''}">
                </div>
                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" name="endDate" th:value="${playoffForm.endDate != null ? playoffForm.endDate.toString() : ''}">
                </div>
            </div>
            <div class="actions" style="margin-top:16px;">
                <button type="submit" class="btn btn-primary">Create Playoff</button>
                <a th:href="@{/admin/playoffs}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
