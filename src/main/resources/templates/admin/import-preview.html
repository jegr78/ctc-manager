<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Import Preview', ~{::section})}">
<body>
<section>
    <h1>Import Preview</h1>
    <div class="card mb-md">
        <p><strong>Season:</strong> <span th:text="${seasonDisplayLabel}"></span> |
           <strong>Matchday:</strong> <span th:text="${matchdayName ?: metadata.matchdayLabel ?: '-'}"></span></p>
    </div>

    <!-- Errors -->
    <div th:if="${preview.hasErrors()}" class="alert alert-error mb-md">
        <strong>Errors:</strong>
        <ul style="margin:8px 0 0 16px;">
            <li th:each="error : ${preview.errors}" th:text="${error}"></li>
        </ul>
    </div>

    <!-- Duplicate Warning -->
    <div th:if="${preview.duplicateDetected}" class="alert alert-error" style="margin-bottom:16px; border-color:#ffa726; background:rgba(255,167,38,0.1); color:#ffa726;">
        <strong>Duplicate detected:</strong> A match with the same teams already exists on this matchday.
        You can overwrite the existing data or cancel.
    </div>

    <form th:action="@{/admin/import/execute}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="seasonId" th:value="${metadata.seasonId}">
        <input type="hidden" name="matchdayId" th:if="${metadata.matchdayId}" th:value="${metadata.matchdayId}">
        <input type="hidden" name="matchdayLabel" th:if="${metadata.matchdayLabel}" th:value="${metadata.matchdayLabel}">
        <input type="hidden" name="playoffMatchupId" th:if="${metadata.playoffMatchupId}" th:value="${metadata.playoffMatchupId}">
        <input type="hidden" name="source" th:value="${source ?: 'csv'}">
        <input type="hidden" name="sheetUrl" th:if="${sheetUrl}" th:value="${sheetUrl}">

        <!-- File re-upload only needed for CSV source -->
        <div class="form-group" style="margin-bottom:16px;" th:if="${source == null or source == 'csv'}">
            <label for="file">Re-select CSV file (for import)</label>
            <input type="file" id="file" name="file" accept=".csv,.txt,.tsv" required>
        </div>
        <div th:if="${source == 'sheet'}" class="text-dim mb-md">
            <p>Source: Google Sheet</p>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>PSN ID (CSV)</th>
                        <th>Pos</th>
                        <th>Quali</th>
                        <th>FL</th>
                        <th>Assignment</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${preview.rows}"
                        th:style="${row.matchResult.type.name() == 'NONE' ? 'background:#3a2e1a' : (row.matchResult.type.name() == 'FUZZY' ? 'background:#1a2a3a' : '')}">
                        <td th:text="${row.teamShortName}"></td>
                        <td><strong th:text="${row.psnId}"></strong></td>
                        <td th:text="${row.position}"></td>
                        <td th:text="${row.qualiPosition}"></td>
                        <td th:text="${row.fastestLap ? '✓' : ''}"></td>
                        <td>
                            <!-- Exact match -->
                            <span th:if="${row.matchResult.type.name() == 'EXACT'}" class="badge badge-active">
                                <span th:text="${row.matchResult.driver.psnId}"></span>
                            </span>
                            <!-- Fuzzy match - needs confirmation -->
                            <span th:if="${row.matchResult.type.name() == 'FUZZY'}">
                                <select th:name="'confirm_' + ${row.psnId}">
                                    <option th:value="${row.matchResult.driver.id}"
                                            th:text="${row.matchResult.driver.psnId + ' (' + #numbers.formatDecimal(row.matchResult.similarity * 100, 1, 0) + '%)'}"></option>
                                    <option value="new">Create new driver</option>
                                </select>
                            </span>
                            <!-- No match -->
                            <span th:if="${row.matchResult.type.name() == 'NONE'}">
                                <input type="hidden" th:name="'confirm_' + ${row.psnId}" value="new">
                                <span class="badge" style="background:#3a2e1a;color:#ffb74d;">Create new</span>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions mt-md">
            <button th:unless="${preview.duplicateDetected}" type="submit" class="btn btn-primary">Execute Import</button>
            <button th:if="${preview.duplicateDetected}" type="submit" name="overwrite" value="true" class="btn btn-danger"
                    onclick="return confirm('This will overwrite the existing match results. Continue?')">Overwrite Existing</button>
            <a th:href="@{/admin/import}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
