<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Import Vorschau', ~{::section})}">
<body>
<section>
    <h1>Import Vorschau</h1>
    <div class="card" style="margin-bottom:16px;">
        <p><strong>Saison:</strong> <span th:text="${metadata.seasonName}"></span> |
           <strong>Spieltag:</strong> <span th:text="${metadata.matchdayLabel}"></span> |
           <strong>Strecke:</strong> <span th:text="${metadata.track ?: '-'}"></span> |
           <strong>Auto:</strong> <span th:text="${metadata.car ?: '-'}"></span></p>
    </div>

    <!-- Errors -->
    <div th:if="${preview.hasErrors()}" class="alert alert-error" style="margin-bottom:16px;">
        <strong>Fehler:</strong>
        <ul style="margin:8px 0 0 16px;">
            <li th:each="error : ${preview.errors}" th:text="${error}"></li>
        </ul>
    </div>

    <form th:action="@{/admin/import/execute}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="seasonName" th:value="${metadata.seasonName}">
        <input type="hidden" name="matchdayLabel" th:value="${metadata.matchdayLabel}">
        <input type="hidden" name="track" th:value="${metadata.track}">
        <input type="hidden" name="car" th:value="${metadata.car}">
        <!-- File needs to be re-uploaded for execute -->
        <div class="form-group" style="margin-bottom:16px;">
            <label for="file">CSV-Datei erneut auswählen (für den Import)</label>
            <input type="file" id="file" name="file" accept=".csv,.txt,.tsv" required>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>PSN ID (CSV)</th>
                        <th>Pos</th>
                        <th>Quali</th>
                        <th>FL</th>
                        <th>Zuordnung</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${preview.rows}"
                        th:style="${row.matchResult.type.name() == 'NONE' ? 'background:#fff3e0' : (row.matchResult.type.name() == 'FUZZY' ? 'background:#e3f2fd' : '')}">
                        <td th:text="${row.teamShortName}"></td>
                        <td><strong th:text="${row.psnId}"></strong></td>
                        <td th:text="${row.position}"></td>
                        <td th:text="${row.qualiPosition}"></td>
                        <td th:text="${row.fastestLap ? '✓' : ''}"></td>
                        <td>
                            <!-- Exact match -->
                            <span th:if="${row.matchResult.type.name() == 'EXACT'}" class="badge badge-active">
                                <span th:text="${row.matchResult.driver.psnId}"></span>
                            </span>
                            <!-- Fuzzy match - needs confirmation -->
                            <span th:if="${row.matchResult.type.name() == 'FUZZY'}">
                                <select th:name="'confirm_' + ${row.psnId}">
                                    <option th:value="${row.matchResult.driver.id}"
                                            th:text="${row.matchResult.driver.psnId + ' (' + #numbers.formatDecimal(row.matchResult.similarity * 100, 1, 0) + '%)'}"></option>
                                    <option value="new">Neuen Fahrer anlegen</option>
                                </select>
                            </span>
                            <!-- No match -->
                            <span th:if="${row.matchResult.type.name() == 'NONE'}">
                                <input type="hidden" th:name="'confirm_' + ${row.psnId}" value="new">
                                <span class="badge" style="background:#fff3e0;color:#e65100;">Neu anlegen</span>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions" style="margin-top:16px;">
            <button type="submit" class="btn btn-primary">Import ausführen</button>
            <a th:href="@{/admin/import}" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</section>
</body>
</html>
