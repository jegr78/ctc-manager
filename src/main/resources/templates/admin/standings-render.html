<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<style th:inline="text">
	@font-face {
		font-family: 'Conthrax';
		src: url([[${fontBase64}]]) format('woff2');
	}
	* { box-sizing: border-box; margin: 0; padding: 0; }
	html, body {
		width: 1920px;
		height: 1080px;
		background: #0f1115;
		color: #f5f6f8;
		font-family: 'Conthrax', 'Helvetica Neue', Arial, sans-serif;
		overflow: hidden;
	}
	body {
		display: flex;
		flex-direction: column;
		padding: 32px 80px 24px 80px;
	}
	header {
		display: flex;
		align-items: center;
		justify-content: space-between;
		margin-bottom: 18px;
		min-height: 100px;
	}
	header .titles h1 {
		font-size: 56px;
		letter-spacing: 5px;
		text-transform: uppercase;
		line-height: 1;
	}
	header .titles h2 {
		margin-top: 8px;
		font-size: 24px;
		letter-spacing: 5px;
		color: #4fc3f7;
		text-transform: uppercase;
	}
	header img.ctc-logo {
		height: 96px;
		width: auto;
	}
	table.standings {
		width: 100%;
		border-collapse: collapse;
		font-variant-numeric: tabular-nums;
	}
	table.standings thead th {
		text-align: left;
		padding: 10px 18px;
		border-bottom: 2px solid #4fc3f7;
		font-size: 20px;
		text-transform: uppercase;
		letter-spacing: 2px;
		color: #9aa3ad;
		background: #131720;
		line-height: 1;
	}
	table.standings thead th.num { text-align: center; }
	table.standings tbody td {
		padding: 0 18px;
		border-bottom: 1px solid #1f242b;
		vertical-align: middle;
		height: [[${rowHeightPx}]]px;
		line-height: 1;
	}
	td.pos { width: 96px; text-align: center; font-size: [[${posFontSizePx}]]px; color: #4fc3f7; }
	td.team-cell { padding: 0 18px; }
	td.team-cell .team-flex {
		display: flex;
		align-items: center;
		gap: 16px;
	}
	td.team-cell .color-strip {
		width: 6px;
		height: [[${logoSizePx}]]px;
		border-radius: 2px;
		flex-shrink: 0;
	}
	td.team-cell img {
		height: [[${logoSizePx}]]px;
		width: [[${logoSizePx}]]px;
		object-fit: contain;
		flex-shrink: 0;
	}
	td.team-cell .name {
		font-size: [[${fontSizePx}]]px;
		font-weight: 700;
	}
	td.num {
		width: 110px;
		text-align: center;
		font-size: [[${fontSizePx}]]px;
	}
	td.num.pts { color: #4fc3f7; font-weight: bold; }
</style>
</head>
<body>
	<header>
		<div class="titles">
			<h1>CTC <span th:text="${seasonYear}"></span> — STANDINGS</h1>
			<h2 th:text="${phaseLabel}"></h2>
		</div>
		<img class="ctc-logo" th:src="${ctcLogoBase64}" alt="" />
	</header>
	<table class="standings">
		<thead>
			<tr>
				<th>#</th>
				<th>Team</th>
				<th class="num">W</th>
				<th class="num">D</th>
				<th class="num">L</th>
				<th class="num">PTS</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="row : ${standings}">
				<td class="pos" th:text="${row.position}"></td>
				<td class="team-cell">
					<div class="team-flex">
						<div class="color-strip" th:style="'background:' + ${row.primaryColor}"></div>
						<img th:if="${row.teamLogoBase64}" th:src="${row.teamLogoBase64}" alt="" />
						<span class="name" th:text="${row.teamName}"></span>
					</div>
				</td>
				<td class="num" th:text="${row.wins}"></td>
				<td class="num" th:text="${row.draws}"></td>
				<td class="num" th:text="${row.losses}"></td>
				<td class="num pts" th:text="${row.points}"></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
