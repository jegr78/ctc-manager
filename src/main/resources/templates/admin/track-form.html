<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Edit Track', ~{::section})}">
<body>
<section>
    <h1 th:text="${trackForm.id != null ? 'Edit Track' : 'New Track'}"></h1>
    <div class="card">
        <form th:action="@{/admin/tracks/save}" th:object="${trackForm}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. Tsukuba Circuit" required>
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" th:field="*{country}" placeholder="e.g. Japan">
                </div>
            </div>
            <div class="actions mt-md">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/tracks}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
    <div th:if="${trackForm.id != null}" class="card mt-md">
        <h2>Image</h2>
        <div th:if="${track != null && track.imageUrl != null}" class="mb-sm">
            <img th:src="${track.imageUrl}" alt="" class="preview-img">
        </div>
        <div th:if="${track == null || track.imageUrl == null}" class="empty-state empty-state--compact"><p>No image yet.</p></div>
        <form th:action="@{/admin/tracks/{id}/image(id=${trackForm.id})}" method="post" enctype="multipart/form-data" class="mt-xs">
            <div class="inline-form">
                <div class="form-group form-group--inline">
                    <input type="file" name="image" accept="image/png,image/jpeg,image/webp,image/gif" required
                           class="file-input">
                    <small class="form-hint">PNG, JPG, WebP, GIF. Max 10 MB.</small>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Upload</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
