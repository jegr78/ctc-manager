<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${data.fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 28px 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 120px;
        }

        .ctc-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .header-center {
            text-align: center;
            flex: 1;
        }

        .header-center .title {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 3px;
        }

        .header-center .subtitle {
            font-size: 28px;
            font-weight: 700;
            color: #ccc;
        }

        .matches {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 64px;
            gap: 10px;
        }

        .match-row {
            display: flex;
            align-items: center;
            height: 100px;
        }

        .seed {
            width: 56px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #999;
        }

        .team-bar {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-radius: 4px;
        }

        .team-bar.home {
            justify-content: flex-start;
        }

        .team-bar.away {
            justify-content: flex-end;
        }

        .team-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            padding: 6px;
        }

        .team-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .team-info.home {
            margin-left: 16px;
            align-items: flex-start;
        }

        .team-info.away {
            margin-right: 16px;
            align-items: flex-end;
        }

        .team-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .vs {
            width: 80px;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <img th:if="${data.ctcLogoBase64 != null}" th:src="${data.ctcLogoBase64}" alt="CTC" class="ctc-logo">
        <div class="header-center">
            <div class="title" th:text="${data.matchdayLabel + ' Overview'}"></div>
            <div class="subtitle" th:text="${data.seasonName + ' ' + data.seasonYear}"></div>
        </div>
        <img th:if="${data.ctcLogoBase64 != null}" th:src="${data.ctcLogoBase64}" alt="CTC" class="ctc-logo">
    </div>

    <div class="matches">
        <div class="match-row" th:each="m : ${data.matches}">
            <span class="seed" th:text="${m.homeSeed}"></span>
            <div class="team-bar home"
                 th:style="'background: linear-gradient(90deg, color-mix(in srgb, ' + ${m.homePrimaryColor ?: '#333'} + ' 70%, black) 0%, #222 100%);'">
                <img th:if="${m.homeLogoBase64 != null}" th:src="${m.homeLogoBase64}" alt="" class="team-logo">
                <div class="team-info home">
                    <span class="team-name" th:text="${m.homeTeamName}"></span>
                </div>
            </div>
            <span class="vs">VS</span>
            <span class="seed" th:text="${m.awaySeed}"></span>
            <div class="team-bar away"
                 th:style="'background: linear-gradient(90deg, #222 0%, color-mix(in srgb, ' + ${m.awayPrimaryColor ?: '#333'} + ' 70%, black) 100%);'">
                <div class="team-info away">
                    <span class="team-name" th:text="${m.awayTeamName}"></span>
                </div>
                <img th:if="${m.awayLogoBase64 != null}" th:src="${m.awayLogoBase64}" alt="" class="team-logo">
            </div>
        </div>
    </div>
</body>
</html>
