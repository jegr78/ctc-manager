<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Access Denied', ~{::content})}">
<div th:fragment="content">
    <div class="card">
        <h1>
            <span th:text="${status}">403</span> &mdash; <span th:text="${error}">Access Denied</span>
        </h1>
        <p th:if="${message}" th:text="${message}">You do not have permission to access this resource.</p>
        <div class="actions">
            <a th:href="@{/admin/seasons}" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</div>
</html>
