<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Generate Matchdays', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <div>
            <a th:href="@{/admin/seasons/{id}(id=${season.id})}" class="back-link">&larr; Back to Season</a>
            <h1 th:text="'Generate Matchdays — ' + ${season.displayLabel}"></h1>
        </div>
    </div>

    <div class="card">
        <p class="text-dim" th:text="'Eligible teams: ' + ${teamCount} + ' · Optimal rounds for full round-robin: ' + ${optimalRounds}"></p>

        <form th:action="@{/admin/seasons/{id}/generate(id=${season.id})}" th:object="${generatorForm}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="numberOfRounds">Number of Rounds</label>
                    <input type="number" id="numberOfRounds" th:field="*{numberOfRounds}" min="1" required>
                </div>
                <div class="form-group">
                    <div class="form-check mt-xl">
                        <input type="checkbox" id="homeAndAway" th:field="*{homeAndAway}">
                        <label for="homeAndAway">Home &amp; Away</label>
                    </div>
                </div>
            </div>
            <div class="form-group" th:if="${phase.layout.name() == 'GROUPS'}">
                <label for="groupId">Group</label>
                <select id="groupId" th:field="*{groupId}" required>
                    <option th:each="g : ${phase.groups}" th:value="${g.id}" th:text="${g.name}"></option>
                </select>
            </div>

            <p id="summary" class="text-dim mt-xs"></p>

            <div class="actions mt-md">
                <button type="submit" class="btn btn-primary">Generate</button>
                <a th:href="@{/admin/seasons/{id}(id=${season.id})}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script>
    (function() {
        var rounds = document.getElementById('numberOfRounds');
        var ha = document.getElementById('homeAndAway');
        var summary = document.getElementById('summary');
        function update() {
            var r = parseInt(rounds.value) || 0;
            var total = ha.checked ? r * 2 : r;
            summary.textContent = 'Total matchdays: ' + total;
        }
        rounds.addEventListener('input', update);
        ha.addEventListener('change', update);
        update();
    })();
    </script>
</section>
</body>
</html>
