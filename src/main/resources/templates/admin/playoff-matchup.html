<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Matchup', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <h1>
            <span th:text="${matchup.round.label}"></span> —
            <a th:if="${matchup.team1 != null}" th:href="@{/admin/teams/{id}(id=${matchup.team1.id})}" class="detail-link" th:text="${matchup.team1.shortName}"></a>
            <span th:if="${matchup.team1 == null}">TBD</span>
            vs
            <a th:if="${matchup.team2 != null}" th:href="@{/admin/teams/{id}(id=${matchup.team2.id})}" class="detail-link" th:text="${matchup.team2.shortName}"></a>
            <span th:if="${matchup.team2 == null}">TBD</span>
        </h1>
        <div class="actions">
            <a th:href="@{/admin/playoffs(seasonId=${playoff.season.id})}" class="btn btn-secondary">Back to Bracket</a>
        </div>
    </div>

    <!-- Winner badge -->
    <div th:if="${matchup.winner != null}" class="alert alert-success">
        Winner: <strong th:text="${matchup.winner.shortName}"></strong>
    </div>

    <!-- Legs table -->
    <div class="card">
        <h2>Legs</h2>
        <table th:if="${!legs.isEmpty()}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Track</th>
                    <th>Car</th>
                    <th th:text="${matchup.team1 != null ? matchup.team1.shortName : 'Team 1'}"></th>
                    <th></th>
                    <th th:text="${matchup.team2 != null ? matchup.team2.shortName : 'Team 2'}"></th>
                    <th>Date</th>
                    <th>Results</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="leg, iter : ${legs}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${leg.track?.name ?: '-'}"></td>
                    <td th:text="${leg.car?.displayName ?: '-'}"></td>
                    <td style="text-align:center;">
                        <span th:if="${leg.results.isEmpty()}" class="text-dim">—</span>
                        <span th:unless="${leg.results.isEmpty()}" th:text="${leg.results.size() + ' Drivers'}"></span>
                    </td>
                    <td></td>
                    <td style="text-align:center;">
                        <span th:if="${leg.results.isEmpty()}" class="text-dim">—</span>
                        <span th:unless="${leg.results.isEmpty()}" th:text="${leg.results.size() + ' Drivers'}"></span>
                    </td>
                    <td th:text="${leg.dateTime != null ? #temporals.format(leg.dateTime, 'dd.MM.yyyy HH:mm') : '-'}"></td>
                    <td>
                        <span th:if="${leg.results.isEmpty()}" class="badge badge-inactive">Open</span>
                        <span th:unless="${leg.results.isEmpty()}" class="badge badge-active"
                              th:text="${leg.results.size() + ' Results'}"></span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/admin/races/{id}(id=${leg.id})}" class="detail-link" style="margin-right:8px;">View</a>
                        <a th:href="@{/admin/races/{id}/results(id=${leg.id})}" class="btn btn-secondary btn-sm">Results</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${legs.isEmpty()}" class="empty-state"><p>No legs created yet.</p></div>
    </div>

    <!-- Add leg form (only if max legs not reached) -->
    <div th:if="${matchup.winner == null && matchup.team1 != null && matchup.team2 != null && legs.size() < matchup.round.bestOfLegs}" class="card">
        <h2>Add New Leg</h2>
        <form th:action="@{/admin/playoffs/matchup/{id}/add-race(id=${matchup.id})}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Track</label>
                    <input type="text" name="track" placeholder="e.g. Tsukuba Circuit">
                </div>
                <div class="form-group">
                    <label>Car</label>
                    <input type="text" name="car" placeholder="e.g. Mazda RX-Vision GT3">
                </div>
            </div>
            <div class="form-group">
                <label for="dateTime">Date &amp; Time</label>
                <input type="datetime-local" id="dateTime" name="dateTime">
                <small class="text-dim">When this leg takes place</small>
            </div>
            <button type="submit" class="btn btn-primary">Add Leg</button>
        </form>
    </div>

    <!-- Determine winner -->
    <div th:if="${matchup.winner == null && !legs.isEmpty()}" class="card">
        <h2>Set Winner</h2>
        <div class="actions" style="gap:16px;flex-wrap:wrap;align-items:center;">
            <form th:action="@{/admin/playoffs/matchup/{id}/determine-winner(id=${matchup.id})}" method="post"
                  onsubmit="return confirm('Auto-determine winner by points?')">
                <button type="submit" class="btn btn-success">Auto-determine</button>
            </form>
            <span class="text-dim">or manually:</span>
            <form th:action="@{/admin/playoffs/matchup/{id}/set-winner(id=${matchup.id})}" method="post"
                  onsubmit="return confirm('Set winner manually?')">
                <div class="actions" style="gap:8px;">
                    <button type="submit" name="winnerTeamId" th:value="${matchup.team1.id}"
                            class="btn btn-secondary" th:text="${matchup.team1.shortName}"></button>
                    <button type="submit" name="winnerTeamId" th:value="${matchup.team2.id}"
                            class="btn btn-secondary" th:text="${matchup.team2.shortName}"></button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
