<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Matchup', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <h1>
            <span th:text="${matchup.round.label}"></span> —
            <span th:text="${matchup.team1 != null ? matchup.team1.shortName : 'TBD'}"></span> vs
            <span th:text="${matchup.team2 != null ? matchup.team2.shortName : 'TBD'}"></span>
        </h1>
        <div class="actions">
            <a th:href="@{/admin/playoffs(seasonId=${playoff.season.id})}" class="btn btn-secondary">Zurück zum Bracket</a>
        </div>
    </div>

    <!-- Winner badge -->
    <div th:if="${matchup.winner != null}" class="alert alert-success">
        Gewinner: <strong th:text="${matchup.winner.shortName}"></strong>
    </div>

    <!-- Legs table -->
    <div class="card">
        <h2>Legs</h2>
        <table th:if="${!legs.isEmpty()}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Strecke</th>
                    <th>Auto</th>
                    <th th:text="${matchup.team1 != null ? matchup.team1.shortName : 'Team 1'}"></th>
                    <th></th>
                    <th th:text="${matchup.team2 != null ? matchup.team2.shortName : 'Team 2'}"></th>
                    <th>Ergebnisse</th>
                    <th>Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="leg, iter : ${legs}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${leg.track ?: '-'}"></td>
                    <td th:text="${leg.car ?: '-'}"></td>
                    <td colspan="3" style="text-align:center;">
                        <span th:if="${leg.results.isEmpty()}" class="text-dim">—</span>
                        <span th:unless="${leg.results.isEmpty()}" th:text="${leg.results.size() + ' Fahrer'}"></span>
                    </td>
                    <td>
                        <span th:if="${leg.results.isEmpty()}" class="badge badge-inactive">Offen</span>
                        <span th:unless="${leg.results.isEmpty()}" class="badge badge-active"
                              th:text="${leg.results.size() + ' Ergebnisse'}"></span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/admin/races/{id}/results(id=${leg.id})}" class="btn btn-secondary btn-sm">Ergebnisse</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${legs.isEmpty()}" class="empty-state"><p>Noch keine Legs angelegt.</p></div>
    </div>

    <!-- Add leg form -->
    <div th:if="${matchup.winner == null && matchup.team1 != null && matchup.team2 != null}" class="card">
        <h2>Neues Leg hinzufügen</h2>
        <form th:action="@{/admin/playoffs/matchup/{id}/add-race(id=${matchup.id})}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Spieltag</label>
                    <select name="matchdayId" required>
                        <option value="">-- Spieltag wählen --</option>
                        <option th:each="md : ${matchdays}" th:value="${md.id}"
                                th:text="${md.label + (md.date != null ? ' (' + md.date + ')' : '')}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Strecke</label>
                    <input type="text" name="track" placeholder="z.B. Tsukuba Circuit">
                </div>
            </div>
            <div class="form-group">
                <label>Auto</label>
                <input type="text" name="car" placeholder="z.B. Mazda RX-Vision GT3">
            </div>
            <button type="submit" class="btn btn-primary">Leg hinzufügen</button>
        </form>
    </div>

    <!-- Determine winner -->
    <div th:if="${matchup.winner == null && !legs.isEmpty()}" class="card">
        <form th:action="@{/admin/playoffs/matchup/{id}/determine-winner(id=${matchup.id})}" method="post"
              onsubmit="return confirm('Gewinner endgültig festlegen?')">
            <button type="submit" class="btn btn-success">Gewinner ermitteln</button>
        </form>
    </div>
</section>
</body>
</html>
