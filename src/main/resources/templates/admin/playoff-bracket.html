<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Playoffs', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <h1>Playoffs</h1>
        <div class="actions">
            <form method="get" th:action="@{/admin/playoffs}" class="btn-with-hint">
                <select name="seasonId" onchange="this.form.submit()">
                    <option value="">-- Select season --</option>
                    <option th:each="s : ${seasons}" th:value="${s.id}" th:text="${s.displayLabel}"
                            th:selected="${s.id == selectedSeasonId}"></option>
                </select>
            </form>
            <a th:if="${selectedSeasonId != null && playoff == null}"
               th:href="@{/admin/playoffs/new(seasonId=${selectedSeasonId})}" class="btn btn-primary">+ New Playoff</a>
            <a th:if="${playoff != null}"
               th:href="@{/admin/playoffs/{id}/seed(id=${playoff.id})}" class="btn btn-secondary">Seeding</a>
        </div>
    </div>

    <div th:if="${bracket != null}" class="card">
        <h2 th:text="${bracket.name}"></h2>
        <div class="bracket" role="img" aria-label="Playoff bracket" tabindex="0">
            <th:block th:each="round, roundStat : ${bracket.rounds}">
            <div th:if="${!roundStat.first}" class="bracket-connector"></div>
            <div class="bracket-round">
                <div class="bracket-round-label" th:text="${round.label}"></div>
                <div th:each="matchup : ${round.matchups}" class="bracket-matchup">
                    <a th:href="@{/admin/playoffs/matchup/{id}(id=${matchup.matchupId})}" class="bracket-matchup-link">
                        <div class="bracket-team" th:classappend="${matchup.team1IsWinner ? 'winner' : ''}">
                            <span class="bracket-team-name">
                                <span th:if="${matchup.team1Seed != null}" class="bracket-seed" th:text="'(' + ${matchup.team1Seed} + ')'"></span>
                                <span th:if="${matchup.team1Id != null}" th:text="${matchup.team1ShortName}"></span>
                                <span th:if="${matchup.team1Id == null}">TBD</span>
                            </span>
                            <span class="bracket-team-score" th:if="${matchup.team1ShortName != null}" th:text="${matchup.team1AggregatePoints}"></span>
                        </div>
                        <div class="bracket-team" th:classappend="${matchup.team2IsWinner ? 'winner' : ''}">
                            <span class="bracket-team-name">
                                <span th:if="${matchup.team2Seed != null}" class="bracket-seed" th:text="'(' + ${matchup.team2Seed} + ')'"></span>
                                <span th:if="${matchup.team2Id != null}" th:text="${matchup.team2ShortName}"></span>
                                <span th:if="${matchup.team2Id == null}">TBD</span>
                            </span>
                            <span class="bracket-team-score" th:if="${matchup.team2ShortName != null}" th:text="${matchup.team2AggregatePoints}"></span>
                        </div>
                    </a>
                </div>
            </div>
            </th:block>
        </div>
    </div>

    <!-- Round Configuration (Legs per round) -->
    <div th:if="${playoff != null}" class="card">
        <h2>Round Configuration</h2>
        <div class="table-scroll">
            <table>
                <thead><tr><th>Round</th><th>Legs</th><th></th><th>Graphics</th></tr></thead>
                <tbody>
                    <tr th:each="round : ${playoff.rounds}">
                        <td th:text="${round.label}"></td>
                        <td>
                            <form th:action="@{/admin/playoffs/round/{id}/set-legs(id=${round.id})}" method="post"
                                  class="btn-with-hint">
                                <select name="bestOfLegs" onchange="this.form.submit()">
                                    <option value="1" th:selected="${round.bestOfLegs == 1}">1 (Single)</option>
                                    <option value="2" th:selected="${round.bestOfLegs == 2}">2 (Home &amp; Away)</option>
                                </select>
                            </form>
                        </td>
                        <td class="text-dim" th:text="${round.matchups.size() + ' Matchups'}"></td>
                        <td>
                            <div class="actions--tight">
                                <form th:action="@{/admin/playoffs/round/{id}/download-overview(id=${round.id})}" method="post" class="form-inline">
                                    <button type="submit" class="btn btn-secondary btn-xs"
                                            th:disabled="${round.matchups.isEmpty()}">Overview</button>
                                </form>
                                <form th:action="@{/admin/playoffs/round/{id}/download-schedule(id=${round.id})}" method="post" class="form-inline">
                                    <button type="submit" class="btn btn-secondary btn-xs"
                                            th:disabled="${round.matchups.isEmpty()}">Schedule</button>
                                </form>
                                <form th:action="@{/admin/playoffs/round/{id}/download-results(id=${round.id})}" method="post" class="form-inline">
                                    <button type="submit" class="btn btn-secondary btn-xs"
                                            th:disabled="${round.matchups.isEmpty()}">Results</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <div th:if="${bracket == null && selectedSeasonId != null}" class="card">
        <div class="empty-state"><p>No playoff created for this season yet.</p></div>
    </div>
    <div th:if="${selectedSeasonId == null}" class="card">
        <div class="empty-state"><p>Please select a season.</p></div>
    </div>
</section>
</body>
</html>
