<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('CSV Import', ~{::section})}">
<body>
<section>
    <h1>CSV Import</h1>
    <div class="card">
        <p style="color:#666; margin-bottom:16px;">
            CSV-Format: <code>Team, PSN ID, Position, Quali, FL</code>
            (Trennzeichen: Komma, Semikolon oder Tab)
        </p>
        <form th:action="@{/admin/import/preview}" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label for="seasonName">Saison</label>
                    <select id="seasonName" name="seasonName" required>
                        <option value="">-- Saison wählen --</option>
                        <option th:each="s : ${seasons}" th:value="${s.name}" th:text="${s.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="matchdayLabel">Spieltag</label>
                    <input type="text" id="matchdayLabel" name="matchdayLabel" placeholder="z.B. Spieltag 1" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="track">Strecke</label>
                    <input type="text" id="track" name="track" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label for="car">Auto</label>
                    <input type="text" id="car" name="car" placeholder="Optional">
                </div>
            </div>
            <div class="form-group">
                <label for="file">CSV-Datei</label>
                <input type="file" id="file" name="file" accept=".csv,.txt,.tsv" required>
            </div>
            <button type="submit" class="btn btn-primary">Vorschau</button>
        </form>
    </div>
</section>
</body>
</html>
