<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Swiss Rounds', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <div>
            <a th:href="@{/admin/seasons/{id}(id=${season.id})}" class="back-link">&larr; Back to Season</a>
            <h1 th:text="'Swiss Rounds — ' + ${season.displayLabel}"></h1>
        </div>
        <div class="actions">
            <span class="text-dim" th:text="'Round ' + ${currentRound} + ' of ' + ${season.totalRounds}"></span>
            <form th:if="${canGenerateNext}" th:action="@{/admin/seasons/{id}/swiss/generate(id=${season.id})}" method="post">
                <button type="submit" class="btn btn-primary">Generate Next Round</button>
            </form>
        </div>
    </div>

    <th:block th:each="md, iter : ${season.matchdays}">
        <div class="card">
            <h2 th:text="${md.label}"></h2>
            <div th:if="${!md.races.isEmpty()}" class="swiss-grid">
                <th:block th:each="race : ${md.races}">
                    <div th:if="${!race.bye}" class="swiss-matchup">
                        <!-- Race with scores -->
                        <th:block th:if="${raceScores[race.id] != null}">
                            <div class="swiss-team" th:classappend="${raceScores[race.id][0] > raceScores[race.id][1] ? 'winner' : ''}">
                                <span th:text="${race.homeTeam.shortName}"></span>
                                <span class="swiss-score" th:text="${raceScores[race.id][0]}"></span>
                            </div>
                            <div class="swiss-team" th:classappend="${raceScores[race.id][1] > raceScores[race.id][0] ? 'winner' : ''}">
                                <span th:text="${race.awayTeam.shortName}"></span>
                                <span class="swiss-score" th:text="${raceScores[race.id][1]}"></span>
                            </div>
                        </th:block>
                        <!-- Quick Score form -->
                        <th:block th:if="${raceScores[race.id] == null}">
                            <form th:action="@{/admin/races/{id}/quick-score(id=${race.id})}" method="post" class="quick-score-form">
                                <input type="hidden" name="returnUrl" th:value="@{/admin/seasons/{id}/swiss(id=${season.id})}">
                                <div class="swiss-team">
                                    <span th:text="${race.homeTeam.shortName}"></span>
                                    <input type="number" name="homeScore" min="0" class="quick-score-input" placeholder="0">
                                </div>
                                <div class="swiss-team">
                                    <span th:text="${race.awayTeam.shortName}"></span>
                                    <input type="number" name="awayScore" min="0" class="quick-score-input" placeholder="0">
                                </div>
                                <button type="submit" class="quick-score-btn">Save</button>
                            </form>
                        </th:block>
                        <div th:if="${race.dateTime != null}" class="text-dim" style="text-align:center;font-size:12px;padding:4px;">
                            <span th:data-london-time="${race.dateTime.toString().substring(0, 16)}"
                                  th:text="${#temporals.format(race.dateTime, 'dd.MM.yyyy HH:mm')}"></span>
                        </div>
                    </div>
                    <div th:if="${race.bye}" class="swiss-matchup bye">
                        <div class="swiss-team winner">
                            <span th:text="${race.homeTeam.shortName}"></span>
                            <span class="swiss-score">BYE</span>
                        </div>
                    </div>
                </th:block>
            </div>
            <div th:if="${md.races.isEmpty()}" class="empty-state empty-state--compact"><p>matches pending</p></div>
        </div>
    </th:block>

    <!-- Show pending rounds -->
    <th:block th:if="${season.totalRounds != null}">
        <div th:each="i : ${#numbers.sequence(season.matchdays.size() + 1, season.totalRounds)}" class="card">
            <h2 th:text="'Round ' + ${i}"></h2>
            <div class="empty-state" style="padding:16px;color:var(--accent);"><p>matches pending</p></div>
        </div>
    </th:block>
</section>
</body>
</html>
