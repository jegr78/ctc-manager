<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Matchday: ' + ${matchday.label}, ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <div>
            <a th:href="@{/admin/matchdays(seasonId=${matchday.season.id})}" class="back-link">&larr; Back to Matchdays</a>
            <h1 th:text="${matchday.label}"></h1>
            <span class="text-dim" th:text="${matchday.season.displayLabel + ' · ' + matchday.season.legs + ' Leg(s)'}"></span>
        </div>
        <div class="actions">
            <a th:href="@{/admin/matchdays/{id}/edit(id=${matchday.id})}" class="btn btn-primary">Edit</a>
            <form th:action="@{/admin/matchdays/{id}/delete(id=${matchday.id})}" method="post"
                  onsubmit="return confirm('Really delete this matchday?')">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="detail-fields">
            <span class="label">Label</span>
            <span th:text="${matchday.label}"></span>
            <span class="label">Sort Index</span>
            <span th:text="${matchday.sortIndex}"></span>
            <span class="label">Season</span>
            <a th:href="@{/admin/seasons/{id}(id=${matchday.season.id})}" class="detail-link" th:text="${matchday.season.displayLabel}"></a>
        </div>

        <!-- Matches -->
        <div class="detail-section">
            <div class="section-header">
                <h2 th:text="'Matches (' + ${matchday.matches.size()} + ')'"></h2>
                <a th:href="@{/admin/matches/new(matchdayId=${matchday.id})}" class="btn btn-primary btn-sm">+ Match</a>
            </div>

            <div th:if="${!matchday.matches.isEmpty()}" class="match-list">
                <div th:each="match : ${matchday.matches}" class="match-row">
                    <!-- Match Header -->
                    <div class="match-header"
                         th:styleappend="${match.bye ? 'opacity:0.6;' : ''}"
                         th:classappend="${!match.races.isEmpty() ? '' : ''}">
                        <div class="match-team-name match-team-name--right" th:text="${match.homeTeam.shortName}"></div>
                        <div th:unless="${match.bye}" class="match-score-area">
                            <span th:if="${match.homeScore != null}" class="match-score-value"
                                  th:classappend="${match.homeScore > match.awayScore ? 'score-win' : (match.homeScore < match.awayScore ? 'score-loss' : 'score-draw')}"
                                  th:text="${match.homeScore}"></span>
                            <span th:unless="${match.homeScore != null}" class="match-score-value match-score-value--dim">–</span>
                            <span class="match-score-separator">:</span>
                            <span th:if="${match.awayScore != null}" class="match-score-value"
                                  th:classappend="${match.awayScore > match.homeScore ? 'score-win' : (match.awayScore < match.homeScore ? 'score-loss' : 'score-draw')}"
                                  th:text="${match.awayScore}"></span>
                            <span th:unless="${match.awayScore != null}" class="match-score-value match-score-value--dim">–</span>
                        </div>
                        <div th:if="${match.bye}" class="match-score-area">
                            <span class="match-bye">Bye</span>
                        </div>
                        <div th:unless="${match.bye}" class="match-team-name" th:text="${match.awayTeam?.shortName}"></div>
                        <div th:if="${match.bye}" class="flex-spacer"></div>
                        <div class="ml-md">
                            <span th:if="${matchday.season.legs > 1}" class="badge"
                                  th:classappend="${match.races.size() >= matchday.season.legs ? 'badge-active' : 'badge-inactive'}"
                                  th:text="${match.races.size() + '/' + matchday.season.legs + ' Legs'}"></span>
                            <span th:if="${matchday.season.legs <= 1 && match.homeScore == null && !match.bye}" class="badge badge-inactive">Open</span>
                        </div>
                    </div>

                    <!-- Legs (only show for multi-leg or when legs exist) -->
                    <div th:if="${matchday.season.legs > 1 && !match.races.isEmpty()}" class="legs-container">
                        <div th:each="race, iter : ${match.races}" class="leg-row"
                             th:styleappend="${!iter.last ? 'border-bottom:1px solid var(--border);' : ''}">
                            <div class="leg-label" th:text="'Leg ' + ${iter.count}"></div>
                            <div class="leg-detail" th:text="${(race.track?.name ?: '') + (race.car != null ? ' · ' + race.car.displayName : '')}"></div>
                            <a th:href="@{/admin/races/{id}(id=${race.id})}" class="detail-link leg-link">
                                <span th:if="${race.results.isEmpty()}" class="badge badge-inactive">Open</span>
                                <span th:unless="${race.results.isEmpty()}" class="badge badge-active" th:text="${race.results.size() + ' Results'}"></span>
                            </a>
                        </div>
                        <div th:if="${match.races.size() < matchday.season.legs}" class="leg-add-row">
                            <form th:action="@{/admin/matches/{id}/add-leg(id=${match.id})}" method="post" class="form-inline">
                                <button type="submit" class="btn btn-secondary btn-sm">+ Add Leg</button>
                            </form>
                        </div>
                        <div th:if="${match.homeScore != null && !match.bye}" class="leg-download-row">
                            <form th:action="@{/admin/matchdays/{mdId}/matches/{mId}/download-match-results(mdId=${matchday.id}, mId=${match.id})}" method="post" class="form-inline">
                                <button type="submit" class="btn btn-secondary btn-sm">&#11015; Match Results</button>
                            </form>
                        </div>
                    </div>

                    <!-- Single-Leg: direkt Link zum Race -->
                    <div th:if="${matchday.season.legs <= 1 && !match.races.isEmpty()}" class="legs-container--single">
                        <div th:each="race : ${match.races}" class="single-leg-row">
                            <div class="leg-detail" th:text="${(race.track?.name ?: '') + (race.car != null ? ' · ' + race.car.displayName : '')}"></div>
                            <a th:href="@{/admin/races/{id}(id=${race.id})}" class="detail-link leg-link">
                                <span th:if="${race.results.isEmpty()}" class="badge badge-inactive">Open</span>
                                <span th:unless="${race.results.isEmpty()}" class="badge badge-active" th:text="${race.results.size() + ' Results'}"></span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${matchday.matches.isEmpty()}" class="empty-state empty-state--compact"><p>No matches yet.</p></div>
        </div>

        <!-- Graphics -->
        <div class="detail-section mt-lg">
            <h2>Graphics</h2>
            <div class="graphics-actions">
                <form th:if="${hasMatches}" th:action="@{/admin/matchdays/{id}/download-overview(id=${matchday.id})}" method="post" class="form-inline">
                    <button type="submit" class="btn btn-primary btn-sm">&#11015; Overview</button>
                </form>
                <button th:unless="${hasMatches}" class="btn btn-sm" disabled>&#11015; Overview</button>

                <div class="btn-with-hint">
                    <form th:if="${hasSchedule}" th:action="@{/admin/matchdays/{id}/download-schedule(id=${matchday.id})}" method="post" class="form-inline">
                        <button type="submit" class="btn btn-primary btn-sm">&#11015; Schedule</button>
                    </form>
                    <button th:unless="${hasSchedule}" class="btn btn-sm" disabled>&#11015; Schedule</button>
                    <span th:if="${hasSchedule && scheduleMissingCount > 0}" class="text-dim text-xs"
                          th:text="${scheduleMissingCount + ' match(es) missing datetime'}"></span>
                    <span th:unless="${hasSchedule}" class="text-dim text-xs">No matches with datetime</span>
                </div>

                <div class="btn-with-hint">
                    <form th:if="${hasResults}" th:action="@{/admin/matchdays/{id}/download-results(id=${matchday.id})}" method="post" class="form-inline">
                        <button type="submit" class="btn btn-primary btn-sm">&#11015; Results</button>
                    </form>
                    <button th:unless="${hasResults}" class="btn btn-sm" disabled>&#11015; Results</button>
                    <span th:unless="${hasResults}" class="text-dim text-xs">No match results yet</span>
                </div>
            </div>
            <p class="text-dim graphics-hint">Graphics are generated on-the-fly and downloaded as PNG (1920&#215;1080).</p>
        </div>

        <div th:if="${!lineupsByTeam.isEmpty()}" class="detail-section mt-lg">
            <h2>Lineup</h2>
            <div th:each="entry : ${lineupsByTeam}" class="lineup-entry">
                <h3 th:text="${entry.key}"></h3>
                <div class="chip-list">
                    <span th:each="lu : ${entry.value}" class="chip">
                        <span th:text="${lu.driver.psnId}"></span>
                    </span>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
