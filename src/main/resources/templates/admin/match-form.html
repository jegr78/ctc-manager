<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('New Match', ~{::section})}">
<body>
<section>
    <a th:href="@{/admin/matchdays/{id}(id=${matchday.id})}" class="back-link">&larr; Back to [[${matchday.label}]]</a>
    <h1>New Match</h1>

    <form th:action="@{/admin/matches/save}" method="post">
        <input type="hidden" name="matchdayId" th:value="${matchday.id}">

        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label for="homeTeamId">Home Team *</label>
                    <select id="homeTeamId" name="homeTeamId" required>
                        <option value="">-- Select --</option>
                        <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.shortName + ' — ' + t.name}"></option>
                    </select>
                </div>
                <div class="form-group" id="awayTeamGroup">
                    <label for="awayTeamId">Away Team</label>
                    <select id="awayTeamId" name="awayTeamId">
                        <option value="">-- Select --</option>
                        <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.shortName + ' — ' + t.name}"></option>
                    </select>
                </div>
            </div>

            <div class="form-check mb-md">
                <input type="checkbox" id="bye" name="bye" value="true">
                <label for="bye">Bye</label>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Create</button>
                <a th:href="@{/admin/matchdays/{id}(id=${matchday.id})}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </form>

    <script>
    (function() {
        var bye = document.getElementById('bye');
        var awayGroup = document.getElementById('awayTeamGroup');
        function toggle() { awayGroup.style.display = bye.checked ? 'none' : ''; }
        bye.addEventListener('change', toggle);
        toggle();
    })();
    </script>
</section>
</body>
</html>
