<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Results', ~{::section})}">
<body>
<section>
    <a th:href="@{/admin/races/{id}(id=${race.id})}" class="back-link">&larr; Back to Race</a>
    <h1>
        Results: <span th:text="${race.homeTeam.shortName}"></span> vs <span th:text="${race.awayTeam.shortName}"></span>
    </h1>
    <p class="text-dim mb-md">
        <span th:text="${race.matchday.label}"></span> —
        <span th:text="${race.track?.name ?: 'No track'}"></span> —
        <span th:text="${race.car?.displayName ?: 'No car'}"></span>
    </p>

    <style>
        .fl-toggle {
            display:inline-flex; cursor:pointer; user-select:none;
        }
        .fl-toggle input { position:absolute; opacity:0; pointer-events:none; }
        .fl-indicator {
            display:inline-flex; align-items:center; justify-content:center;
            width:36px; height:28px;
            border-radius:var(--radius-sm);
            border:1px solid var(--border);
            background:var(--bg-input);
            color:var(--text-dim);
            font-size:11px; font-weight:700; letter-spacing:0.5px;
            transition:all 0.15s ease;
        }
        .fl-toggle input:checked + .fl-indicator {
            background:rgba(79,195,247,0.15);
            border-color:var(--accent);
            color:var(--accent);
            box-shadow:0 0 8px rgba(79,195,247,0.25);
        }
        .fl-toggle:hover .fl-indicator {
            border-color:var(--text-dim);
        }
        .fl-toggle input:focus-visible + .fl-indicator {
            outline:2px solid var(--border-focus);
            outline-offset:2px;
        }
        .points-cell {
            font-variant-numeric:tabular-nums; font-weight:600; color:var(--accent);
            min-width:40px; text-align:center;
        }
        .points-breakdown {
            font-size:11px; color:var(--text-dim); font-variant-numeric:tabular-nums;
        }
    </style>

    <div class="card">
        <form th:action="@{/admin/races/{id}/results(id=${race.id})}" th:object="${raceForm}" method="post" id="resultsForm">
            <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>Driver (PSN ID)</th>
                        <th class="td-center">Pos</th>
                        <th class="td-center">Quali</th>
                        <th class="td-center">FL</th>
                        <th class="td-center">Points</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="result, iter : ${raceForm.results}" class="result-row">
                        <td>
                            <span th:text="${result.teamShortName}" class="results-team-name"></span>
                            <input type="hidden" th:name="'results[' + ${iter.index} + '].driverId'" th:value="${result.driverId}">
                            <input type="hidden" th:name="'results[' + ${iter.index} + '].driverPsnId'" th:value="${result.driverPsnId}">
                            <input type="hidden" th:name="'results[' + ${iter.index} + '].teamShortName'" th:value="${result.teamShortName}">
                        </td>
                        <td class="results-driver-name" th:text="${result.driverPsnId}"></td>
                        <td class="td-center">
                            <input type="number" class="pos-input results-pos-input" th:name="'results[' + ${iter.index} + '].position'"
                                   th:value="${result.position}" min="1" max="12" required>
                        </td>
                        <td class="td-center">
                            <input type="number" class="quali-input results-pos-input" th:name="'results[' + ${iter.index} + '].qualiPosition'"
                                   th:value="${result.qualiPosition}" min="1" max="12" required>
                        </td>
                        <td class="td-center">
                            <label class="fl-toggle">
                                <input type="checkbox" class="fl-input" th:name="'results[' + ${iter.index} + '].fastestLap'"
                                       th:checked="${result.fastestLap}" value="true">
                                <span class="fl-indicator">FL</span>
                            </label>
                        </td>
                        <td class="td-center">
                            <span class="points-cell">-</span>
                            <div class="points-breakdown"></div>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="results-totals-row">
                        <td colspan="5" class="results-totals-label">Team Totals</td>
                        <td class="td-center" id="teamTotals"></td>
                    </tr>
                </tfoot>
            </table>
            </div>
            <div class="actions mt-md">
                <button type="submit" class="btn btn-primary">Save Results</button>
                <a th:href="@{/admin/races/{id}(id=${race.id})}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        var racePoints = /*[[${raceScoring.racePointsArray}]]*/ [];
        var qualiPoints = /*[[${raceScoring.qualiPointsArray}]]*/ [];
        var flPoints = /*[[${raceScoring.fastestLapPoints}]]*/ 0;
        var homeTeam = /*[[${race.homeTeam.shortName}]]*/ '';

        function calcPoints() {
            var rows = document.querySelectorAll('.result-row');
            var totals = {};

            rows.forEach(function(row) {
                var pos = parseInt(row.querySelector('.pos-input').value) || 0;
                var quali = parseInt(row.querySelector('.quali-input').value) || 0;
                var fl = row.querySelector('.fl-input').checked;
                var team = row.querySelector('td span').textContent.trim();

                var rp = (pos >= 1 && pos <= racePoints.length) ? racePoints[pos - 1] : 0;
                var qp = (quali >= 1 && quali <= qualiPoints.length) ? qualiPoints[quali - 1] : 0;
                var fp = fl ? flPoints : 0;
                var total = rp + qp + fp;

                var pointsCell = row.querySelector('.points-cell');
                var breakdown = row.querySelector('.points-breakdown');
                pointsCell.textContent = total;

                var parts = [];
                if (rp > 0) parts.push(rp + 'R');
                if (qp > 0) parts.push(qp + 'Q');
                if (fp > 0) parts.push(fp + 'FL');
                breakdown.textContent = parts.length > 0 ? parts.join('+') : '';

                totals[team] = (totals[team] || 0) + total;
            });

            // Team totals
            var totalsEl = document.getElementById('teamTotals');
            var parts = [];
            for (var t in totals) {
                var isHome = (t === homeTeam);
                parts.push('<span style="font-weight:700; color:' + (isHome ? 'var(--accent)' : 'var(--white)') + ';">' + totals[t] + '</span>');
            }
            totalsEl.textContent = '';
            var first = true;
            for (var t in totals) {
                if (!first) {
                    var sep = document.createElement('span');
                    sep.textContent = ' : ';
                    sep.classList.add('results-total-sep');
                    totalsEl.appendChild(sep);
                }
                var span = document.createElement('span');
                span.textContent = totals[t];
                span.classList.add('results-total-value');
                span.classList.add((t === homeTeam) ? 'results-total-value--home' : 'results-total-value--away');
                totalsEl.appendChild(span);
                first = false;
            }
        }

        // FL: only one driver can have fastest lap
        document.querySelectorAll('.fl-input').forEach(function(cb) {
            cb.addEventListener('change', function() {
                if (this.checked) {
                    document.querySelectorAll('.fl-input').forEach(function(other) {
                        if (other !== cb) other.checked = false;
                    });
                }
                calcPoints();
            });
        });

        // Recalculate on any input change
        document.querySelectorAll('.pos-input, .quali-input').forEach(function(input) {
            input.addEventListener('change', calcPoints);
            input.addEventListener('input', calcPoints);
        });

        // Initial calculation
        calcPoints();
    </script>
</section>
</body>
</html>
