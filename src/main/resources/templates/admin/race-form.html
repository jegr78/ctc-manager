<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Edit Race', ~{::section})}">
<body>
<section>
    <h1 th:text="${raceForm.id != null ? 'Edit Race' : 'New Race'}"></h1>
    <div class="card">
        <form th:action="@{/admin/races/save}" th:object="${raceForm}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <label for="matchdayId">Matchday</label>
                <select id="matchdayId" th:field="*{matchdayId}" required>
                    <option value="">-- Select matchday --</option>
                    <option th:each="md : ${matchdays}" th:value="${md.id}"
                            th:attr="data-season-id=${md.season.id}"
                            th:text="${md.season.displayLabel + ' — ' + md.label}"></option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="homeTeamId">Home Team</label>
                    <select id="homeTeamId" th:field="*{homeTeamId}" required>
                        <option value="">-- Select team --</option>
                        <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.shortName + ' - ' + t.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="awayTeamId">Away Team</label>
                    <select id="awayTeamId" th:field="*{awayTeamId}" required>
                        <option value="">-- Select team --</option>
                        <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.shortName + ' - ' + t.name}"></option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="trackSearch">Track</label>
                    <div class="searchable-dropdown" id="trackDropdown"
                         th:if="${seasonTracks != null && !seasonTracks.isEmpty()}">
                        <input type="text" id="trackSearch" placeholder="Search tracks..."
                               autocomplete="off" class="dropdown-input">
                        <input type="hidden" name="trackId" th:value="${raceForm.trackId}" id="trackId">
                        <div class="dropdown-list" id="trackList">
                            <div th:each="t : ${seasonTracks}"
                                 class="dropdown-item"
                                 th:classappend="${usedTrackIds != null && usedTrackIds.contains(t.id)} ? 'disabled' : ''"
                                 th:attr="data-id=${t.id},data-label=${t.name}"
                                 th:text="${t.name + (t.country != null ? ' (' + t.country + ')' : '')}">
                            </div>
                        </div>
                    </div>
                    <div th:if="${seasonTracks == null || seasonTracks.isEmpty()}" class="text-dim"
                         style="font-size:13px;margin-top:4px;">
                        No tracks assigned to this season yet.
                    </div>
                    <div th:if="${usedTrackIds != null && !usedTrackIds.isEmpty()}"
                         style="margin-top:8px;padding:10px 12px;background:var(--bg-input);border-radius:var(--radius-sm);border-left:3px solid var(--accent);">
                        <div style="font-size:11px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;">Already used this season</div>
                        <div style="font-size:13px;color:var(--text-dim);">
                            <span th:each="t : ${seasonTracks}" th:if="${usedTrackIds.contains(t.id)}"
                                  th:text="${t.name}" style="display:inline-block;margin-right:8px;"></span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="carSearch">Car</label>
                    <div class="searchable-dropdown" id="carDropdown"
                         th:if="${seasonCars != null && !seasonCars.isEmpty()}">
                        <input type="text" id="carSearch" placeholder="Search cars..."
                               autocomplete="off" class="dropdown-input">
                        <input type="hidden" name="carId" th:value="${raceForm.carId}" id="carId">
                        <div class="dropdown-list" id="carList">
                            <div th:each="c : ${seasonCars}"
                                 class="dropdown-item"
                                 th:classappend="${usedCarIds != null && usedCarIds.contains(c.id)} ? 'disabled' : ''"
                                 th:attr="data-id=${c.id},data-label=${c.manufacturer + ' — ' + c.name}"
                                 th:text="${c.manufacturer + ' — ' + c.name}">
                            </div>
                        </div>
                    </div>
                    <div th:if="${seasonCars == null || seasonCars.isEmpty()}" class="text-dim"
                         style="font-size:13px;margin-top:4px;">
                        No cars assigned to this season yet.
                    </div>
                    <div th:if="${usedCarIds != null && !usedCarIds.isEmpty()}"
                         style="margin-top:8px;padding:10px 12px;background:var(--bg-input);border-radius:var(--radius-sm);border-left:3px solid var(--accent);">
                        <div style="font-size:11px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;">Already used this season</div>
                        <div style="font-size:13px;color:var(--text-dim);">
                            <span th:each="c : ${seasonCars}" th:if="${usedCarIds.contains(c.id)}"
                                  th:text="${c.displayName}" style="display:inline-block;margin-right:8px;"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="dateTime">Date &amp; Time</label>
                <input type="datetime-local" id="dateTime" name="dateTime"
                       th:value="${raceForm.dateTime != null ? raceForm.dateTime.toString().substring(0, 16) : ''}">
                <small class="text-dim">When this match takes place</small>
            </div>
            <div class="actions" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/races}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
