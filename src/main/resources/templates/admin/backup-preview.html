<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Backup', ~{::section})}">
<body>
<section>
    <h1>Backup Import — Preview</h1>

    <div class="card mb-md">
        <p><strong>File:</strong> <span th:text="${preview.originalFilename}">backup.zip</span></p>
        <p><strong>Size:</strong> <span th:text="${#numbers.formatDecimal(preview.fileSizeBytes / (1024.0 * 1024.0), 1, 2)}">0.00</span> MB</p>
        <p><strong>Uploads:</strong> <span th:text="${preview.uploadFileCount}">0</span> files</p>
        <p><strong>Total imported rows:</strong> <span th:text="${preview.totalImportedRows}">0</span></p>
    </div>

    <div class="alert alert-success mb-md" role="status">
        Schema version <span th:text="${preview.schemaVersion}">1</span> matches.
    </div>

    <div class="card-grid mb-md">
        <div class="card card--compact" th:each="card : ${preview.entityCounts}">
            <h3 th:text="${card.humanLabel}">Entity</h3>
            <p>
                <strong th:text="${card.currentRows}">0</strong>
                →
                <strong th:text="${card.importedRows}">0</strong>
            </p>
            <span class="badge mt-xs"
                  th:classappend="${card.importedRows lt card.currentRows ? ' alert-error' : (card.importedRows gt card.currentRows ? ' alert-success' : ' badge-inactive')}"
                  th:text="${card.importedRows - card.currentRows}"
                  th:aria-label="${(card.importedRows - card.currentRows) + ' rows ' + (card.importedRows lt card.currentRows ? '(data loss)' : (card.importedRows gt card.currentRows ? '(gain)' : '(unchanged)'))}">0</span>
        </div>
    </div>

    <div class="actions">
        <form th:action="@{/admin/backup/import-cancel}" method="post">
            <input type="hidden" name="stagingId" th:value="${preview.stagingId}">
            <button type="submit" class="btn btn-secondary">Cancel</button>
        </form>
        <form th:action="@{/admin/backup/import-confirm}" method="post">
            <input type="hidden" name="stagingId" th:value="${preview.stagingId}">
            <button type="submit" class="btn btn-primary">Proceed to Confirm</button>
        </form>
    </div>
</section>
</body>
</html>
