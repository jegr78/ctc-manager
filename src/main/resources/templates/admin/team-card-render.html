<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        /* --- Team-Variablen (datengetrieben) ---
           accentVis / onPrimary werden idealerweise vom Service berechnet
           (siehe Handoff). Fallback: roher Akzent bzw. Weiß. */
        :root {
            --primary:    [[${primaryColor}]];
            --secondary:  [[${secondaryColor}]];
            --accent:     [[${accentColor}]];
            --grad:       [[${gradientColor}]];
            --accent-vis: [[${accentVisColor != null ? accentVisColor : accentColor}]];
            --on-primary: [[${onPrimaryColor != null ? onPrimaryColor : '#ffffff'}]];
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px; height: 1920px; overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif; color: #fff;
            position: relative;
            /* sehr dunkle Primärfarbe (z. B. #000) auf sichtbare Helligkeit anheben, Farbton bleibt */
            --primary-vis: oklch(from var(--primary) max(l, 0.62) c h);
            background: radial-gradient(135% 70% at 50% 28%,
                color-mix(in srgb, var(--grad) 85%, #0a0a0e) 0%,
                #0a0a0e 56%, #060608 100%);
        }

        /* Carbon-Textur */
        .stripes { position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(118deg, transparent 0 74px, rgba(255,255,255,.016) 74px 76px); }

        /* Teamfarben-Schienen + Akzent-Pinstripe (symmetrisch) */
        .rail { position: absolute; top: 0; bottom: 0; width: 26px;
            background: linear-gradient(180deg, var(--primary-vis), color-mix(in srgb, var(--primary-vis) 55%, #000)); }
        .rail-l { left: 0; } .rail-r { right: 0; }
        .pin { position: absolute; top: 0; bottom: 0; width: 6px; background: var(--accent-vis); opacity: .85; }
        .pin-l { left: 42px; } .pin-r { right: 42px; }

        /* HUD-Rahmen mit abgeschrägten Ecken */
        .frame { position: absolute; inset: 74px 84px;
            border: 2px solid color-mix(in srgb, var(--accent-vis) 42%, transparent);
            clip-path: polygon(46px 0, 100% 0, 100% calc(100% - 46px), calc(100% - 46px) 100%, 0 100%, 0 46px); }

        .content { position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; padding: 148px 120px 150px; }

        /* Rating — Parallelogramm, prominent oben */
        .rating { transform: skewX(-11deg);
            background: linear-gradient(180deg, var(--primary), color-mix(in srgb, var(--primary) 78%, #000));
            padding: 24px 64px 22px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 18px 44px rgba(0,0,0,.5), inset 0 0 0 2px color-mix(in srgb, var(--accent-vis) 35%, transparent); }
        .rating-number { transform: skewX(11deg); font-size: 130px; font-weight: 600;
            line-height: .88; letter-spacing: -5px; color: var(--on-primary);
            /* dezente dunkle Kontur: hält weiße Zahl auch auf hellem primary lesbar (Fallback ohne Patch) */
            text-shadow: 0 1px 2px rgba(0,0,0,.40), 0 0 10px rgba(0,0,0,.22); }

        /* Mitte: Logo + Name */
        .mid { flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 60px; width: 100%; }
        /* Querformat-Logo-Zone: fängt breite UND quadratische Logos ab */
        .logo-wrap { position: relative; width: 860px; height: 480px;
            display: flex; align-items: center; justify-content: center; }
        .logo-glow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, color-mix(in srgb, var(--primary) 34%, transparent) 0%, transparent 62%); }
        /* Doppelte Kontur (dunkel + hell) + weiter Glow: Logo bleibt auf JEDEM Untergrund lesbar.
           width/height:100% + contain: kleine Logos werden hoch-, große runterskaliert (Seitenverhältnis bleibt) */
        .logo-wrap img { position: relative; width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 3px rgba(0,0,0,.75)) drop-shadow(0 0 10px rgba(255,255,255,.55))
                    drop-shadow(0 0 22px rgba(255,255,255,.28)) drop-shadow(0 14px 26px rgba(0,0,0,.5)); }
        .logo-none { position: relative; font-size: 96px; letter-spacing: 4px; color: var(--primary); opacity: .85; }

        .name-block { display: flex; flex-direction: column; align-items: center; gap: 24px; }
        .team-name { font-size: 58px; font-weight: 600; line-height: 1.05; text-align: center;
            text-wrap: balance; max-width: 840px; }
        .sub { font-size: 25px; letter-spacing: 7px; padding: 11px 28px 11px 35px;
            border: 2px solid var(--accent-vis); color: var(--accent-vis); border-radius: 4px; text-transform: uppercase; }

        /* Stats — HUD-Zeile mit Akzent-Klammern */
        .stats { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; gap: 70px; }
        .stat { display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .stat-l { font-size: 30px; letter-spacing: 8px; color: var(--accent-vis); padding-left: 8px; font-weight: 600; }
        .stat-v { font-size: 84px; font-weight: 600; line-height: 1; }
        .stat-v.pts { color: var(--primary-vis); }
        .stat-v.rec { font-size: 60px; letter-spacing: 2px; }
        .vline { width: 3px; height: 104px; background: color-mix(in srgb, var(--accent-vis) 50%, transparent); }
        .brk { position: absolute; width: 38px; height: 108px;
            border-top: 4px solid var(--accent-vis); border-bottom: 4px solid var(--accent-vis); }
        .brk-l { left: 40px; border-left: 4px solid var(--accent-vis); }
        .brk-r { right: 40px; border-right: 4px solid var(--accent-vis); }

        /* CTC-Signatur als dezente Liga-Marke unten (echtes CTC-Logo, weiß invertiert) */
        .ctc-mark { display: flex; align-items: center; justify-content: center; margin-top: 46px; opacity: .5; }
        .ctc-mark img { width: 64px; height: 64px; filter: invert(1); }
    </style>
</head>
<body>
    <div class="stripes"></div>
    <div class="rail rail-l"></div><div class="rail rail-r"></div>
    <div class="pin pin-l"></div><div class="pin pin-r"></div>
    <div class="frame"></div>

    <div class="content">
        <div class="rating">
            <svg class="rating-bolt" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <path d="M36 4L16 36h12l-4 24 24-32H34z"/>
            </svg>
            <span class="rating-number" th:text="${rating != null ? rating : '—'}"></span>
        </div>

        <div class="mid">
            <div class="logo-wrap">
                <div class="logo-glow"></div>
                <img th:if="${logoBase64 != null}" th:src="${logoBase64}" alt="">
                <span th:if="${logoBase64 == null}" class="logo-none">No Logo</span>
            </div>
            <div class="name-block">
                <div class="team-name" th:text="${teamName}"></div>
                <div class="sub" th:if="${subTeamLabel != null}" th:text="'TEAM ' + ${subTeamLabel}"></div>
            </div>
        </div>

        <div class="stats">
            <span class="brk brk-l"></span>
            <div class="stat">
                <div class="stat-l">POINTS</div>
                <div class="stat-v pts" th:text="${points}"></div>
            </div>
            <div class="vline"></div>
            <div class="stat">
                <div class="stat-l">RECORD</div>
                <div class="stat-v rec" th:text="${record}"></div>
            </div>
            <span class="brk brk-r"></span>
        </div>
