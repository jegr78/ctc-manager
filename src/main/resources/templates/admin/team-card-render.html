<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif;
            color: white;
            position: relative;
        }

        .background {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                [[${gradientColor}]] 0%,
                #111111 100%);
        }

        .glow-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                [[${primaryColor}]]40 0%,
                transparent 40%);
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding: 100px 60px 120px;
        }

        .spacer {
            flex: 1;
        }

        .rating-circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 6px solid [[${secondaryColor}]];
            background: rgba(50, 50, 50, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 120px;
        }

        .rating-bolt {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 10px;
            opacity: 0.15;
        }

        .rating-number {
            position: relative;
            font-size: 110px;
            font-weight: 600;
            letter-spacing: -4px;
        }

        .logo-container {
            width: 540px;
            height: 540px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.10);
            border-radius: 50%;
            padding: 40px;
            margin-bottom: 72px;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .center-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-info {
            text-align: center;
        }

        .team-name {
            font-size: 52px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .sub-team-label {
            font-size: 36px;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .stats {
            text-align: center;
        }

        .stat-label {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 6px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 72px;
            font-weight: 600;
            margin-bottom: 40px;
        }

        .record-value {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="glow-overlay"></div>
    <div class="content">
        <div class="rating-circle">
            <svg class="rating-bolt" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <path d="M36 4L16 36h12l-4 24 24-32H34z" fill="white"/>
            </svg>
            <span class="rating-number" th:text="${rating != null ? rating : '—'}"></span>
        </div>
        <div class="center-group">
            <div class="logo-container">
                <img th:if="${logoBase64 != null}" th:src="${logoBase64}" alt="">
                <span th:if="${logoBase64 == null}" style="font-size:48px;opacity:0.3;">No Logo</span>
            </div>
            <div class="team-name" th:text="${teamName}"></div>
            <div class="sub-team-label" th:if="${subTeamLabel != null}" th:text="${subTeamLabel}"></div>
        </div>
        <div class="spacer"></div>
        <div class="team-info">
            <div class="stats">
                <div class="stat-label">POINTS</div>
                <div class="stat-value" th:text="${points}"></div>
                <div class="stat-label">RECORD</div>
                <div class="record-value" th:text="${record}"></div>
            </div>
        </div>
    </div>
</body>
</html>
