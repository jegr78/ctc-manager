<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" th:href="@{/admin/img/favicon.svg}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/admin/img/apple-touch-icon.png}">
    <title th:text="'CTC Admin - ' + ${title}">CTC Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
    <th:block th:if="${_csrf != null}">
        <meta name="_csrf" th:content="${_csrf.token}">
        <meta name="_csrf_header" th:content="${_csrf.headerName}">
    </th:block>
    <script>
    function csrfFetch(url, options) {
        var csrfMeta = document.querySelector('meta[name="_csrf"]');
        var headerMeta = document.querySelector('meta[name="_csrf_header"]');
        if (csrfMeta && headerMeta && csrfMeta.content && headerMeta.content) {
            options = options || {};
            options.headers = Object.assign({}, options.headers, {
                [headerMeta.content]: csrfMeta.content
            });
        }
        return fetch(url, options);
    }
    </script>
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-overlay"></div>
        <button class="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="sidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img th:src="@{/admin/img/ctc-logo-white.png}" alt="CTC" class="sidebar-logo">
                <div class="sidebar-brand-text">
                    <span>CTC Admin</span>
                    <small class="sidebar-version" th:text="${appVersion}"></small>
                </div>
            </div>
            <nav aria-label="Main navigation">
                <div class="sidebar-group">
                    <span class="sidebar-group-label">League</span>
                    <a th:href="@{/admin/seasons}" th:classappend="${title.contains('Season') ? 'active' : ''}">Seasons</a>
                    <a th:href="@{/admin/matchdays}" th:classappend="${title.contains('Matchday') ? 'active' : ''}">Matchdays</a>
                    <a th:href="@{/admin/races}" th:classappend="${title.contains('Race') ? 'active' : ''}">Races</a>
                    <a th:href="@{/admin/playoffs}" th:classappend="${title.contains('Playoff') || title.contains('Matchup') ? 'active' : ''}">Playoffs</a>
                </div>
                <div class="sidebar-group">
                    <span class="sidebar-group-label">Master Data</span>
                    <a th:href="@{/admin/teams}" th:classappend="${title.contains('Team') and !title.contains('Team Cards') ? 'active' : ''}">Teams</a>
                    <a th:href="@{/admin/drivers}" th:classappend="${title.contains('Driver') ? 'active' : ''}">Drivers</a>
                    <a th:href="@{/admin/cars}" th:classappend="${title.contains('Car') and !title.contains('Team Cards') ? 'active' : ''}">Cars</a>
                    <a th:href="@{/admin/tracks}" th:classappend="${title.contains('Track') ? 'active' : ''}">Tracks</a>
                </div>
                <div class="sidebar-group">
                    <span class="sidebar-group-label">Scoring</span>
                    <a th:href="@{/admin/race-scorings}" th:classappend="${title.contains('Race-Scoring') ? 'active' : ''}">Race-Scorings</a>
                    <a th:href="@{/admin/match-scorings}" th:classappend="${title.contains('Match-Scoring') ? 'active' : ''}">Match-Scorings</a>
                </div>
                <div class="sidebar-group">
                    <span class="sidebar-group-label">Tools</span>
                    <a th:href="@{/admin/standings}" th:classappend="${title.contains('Standing') ? 'active' : ''}">Standings</a>
                    <a th:href="@{/admin/tools/power-rankings}" th:classappend="${title.contains('Power Rankings') ? 'active' : ''}">Power Rankings</a>
                    <a th:href="@{/admin/import}" th:classappend="${title.contains('Import') ? 'active' : ''}">Import</a>
                    <a th:href="@{/admin/gt7-sync}" th:classappend="${title.contains('GT7') ? 'active' : ''}">GT7 Sync</a>
                    <a th:href="@{/admin/tools/team-cards}" th:classappend="${title.contains('Team Cards') ? 'active' : ''}">Team Cards</a>
                    <a th:href="@{/admin/tools/template-editors}" th:classappend="${title.contains('Template') ? 'active' : ''}">Template Editors</a>
                    <a th:href="@{/admin/generate}" class="btn-generate">Generate Site</a>
                </div>
            </nav>
        </aside>
        <main class="main-content">
            <div class="container">
                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
                <div th:replace="${content}"></div>
            </div>
        </main>
    </div>
    <script th:src="@{/admin/js/sidebar-toggle.js}"></script>
    <script th:src="@{/admin/js/searchable-dropdown.js}"></script>
    <script th:src="@{/admin/js/color-sync.js}"></script>
    <script th:src="@{/admin/js/timezone.js}"></script>
</body>
</html>
