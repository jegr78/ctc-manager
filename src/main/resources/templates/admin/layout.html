<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'CTC Admin - ' + ${title}">CTC Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-brand">
            <img th:src="@{/admin/img/ctc-logo-white.png}" alt="CTC" style="height:28px;width:28px;">
            CTC Admin
        </div>
        <div class="navbar-links">
            <a th:href="@{/admin/seasons}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/seasons') ? 'page' : null}">Seasons</a>
            <a th:href="@{/admin/teams}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/teams') ? 'page' : null}">Teams</a>
            <a th:href="@{/admin/drivers}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/drivers') ? 'page' : null}">Drivers</a>
            <a th:href="@{/admin/matchdays}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/matchdays') ? 'page' : null}">Matchdays</a>
            <a th:href="@{/admin/races}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/races') ? 'page' : null}">Races</a>
            <span class="navbar-separator">|</span>
            <a th:href="@{/admin/import}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/import') ? 'page' : null}">Import</a>
            <a th:href="@{/admin/standings}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/standings') ? 'page' : null}">Standings</a>
            <a th:href="@{/admin/playoffs}" th:attr="aria-current=${#httpServletRequest.requestURI.contains('/admin/playoffs') ? 'page' : null}">Playoffs</a>
            <a th:href="@{/admin/generate}" class="btn-generate">Generate Site</a>
        </div>
    </nav>
    <main class="container">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
        <div th:replace="${content}"></div>
    </main>
</body>
</html>
