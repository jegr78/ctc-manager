<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Races', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <h1>
            <span th:if="${matchday != null}" th:text="'Races — ' + ${matchday.label} + ' (' + ${matchday.season.name} + ')'">Races</span>
            <span th:if="${matchday == null}">All Races</span>
        </h1>
        <a th:href="@{/admin/races/new(matchdayId=${matchday?.id})}" class="btn btn-primary">+ New Race</a>
    </div>
    <div class="card">
        <table th:if="${!races.isEmpty()}">
            <thead>
                <tr><th>Home</th><th></th><th>Away</th><th>Track</th><th>Car</th><th>Date</th><th>Results</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="race : ${races}">
                    <td><a th:href="@{/admin/races/{id}(id=${race.id})}" class="detail-link"><strong th:text="${race.homeTeam.shortName}"></strong></a></td>
                    <td style="text-align:center">vs</td>
                    <td><a th:href="@{/admin/races/{id}(id=${race.id})}" class="detail-link"><strong th:text="${race.awayTeam.shortName}"></strong></a></td>
                    <td th:text="${race.track ?: '-'}"></td>
                    <td th:text="${race.car ?: '-'}"></td>
                    <td th:text="${race.dateTime != null ? #temporals.format(race.dateTime, 'dd.MM.yyyy HH:mm') : '-'}"></td>
                    <td>
                        <span th:if="${race.results.isEmpty()}" class="badge badge-inactive">Open</span>
                        <span th:unless="${race.results.isEmpty()}" class="badge badge-active"
                              th:text="${race.results.size() + ' Results'}"></span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/admin/races/{id}/results(id=${race.id})}" class="btn btn-success btn-sm">Results</a>
                        <a th:href="@{/admin/races/{id}/edit(id=${race.id})}" class="btn btn-secondary btn-sm">Edit</a>
                        <form th:action="@{/admin/races/{id}/delete(id=${race.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Really delete this race?')">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${races.isEmpty()}" class="empty-state"><p>No races created yet.</p></div>
    </div>
</section>
</body>
</html>
