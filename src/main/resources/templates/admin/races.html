<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Races', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <h1>
            <span th:if="${matchday != null}" th:text="'Races — ' + ${matchday.label} + ' (' + ${matchday.season.displayLabel} + ')'">Races</span>
            <span th:if="${matchday == null}">Races</span>
        </h1>
        <a th:if="${matchday != null}" th:href="@{/admin/races/new(matchdayId=${matchday.id})}" class="btn btn-primary">+ New Race</a>
    </div>

    <!-- Filter Bar -->
    <div th:if="${matchday == null}" class="card" style="padding:12px 16px; margin-bottom:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <form th:action="@{/admin/races}" method="get" style="display:flex; gap:8px; align-items:center;">
            <label class="text-dim" style="font-size:13px; white-space:nowrap;">Season</label>
            <select name="seasonId" onchange="this.form.submit()" style="min-width:200px;">
                <option value="">All Seasons</option>
                <option th:each="s : ${seasons}" th:value="${s.id}" th:text="${s.displayLabel}"
                        th:selected="${selectedSeasonId != null && selectedSeasonId.equals(s.id)}"></option>
            </select>
        </form>
        <div style="flex:1;"></div>
        <input type="text" id="raceFilter" placeholder="Filter by team, track, car..."
               style="width:240px; padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-input); color:var(--white); font-size:13px;">
    </div>

    <div class="card">
        <div class="table-scroll">
        <table th:if="${!races.isEmpty()}" id="racesTable">
            <thead>
                <tr>
                    <th class="sortable" data-col="0">Season</th>
                    <th class="sortable" data-col="1">Matchday</th>
                    <th class="sortable" data-col="2">Date</th>
                    <th class="sortable" data-col="3">Home</th>
                    <th></th>
                    <th class="sortable" data-col="5">Away</th>
                    <th class="sortable" data-col="6">Track</th>
                    <th class="sortable" data-col="7">Car</th>
                    <th>Context</th>
                    <th style="text-align:center;">Score</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="race : ${races}">
                    <td class="text-dim" style="font-size:13px;">
                        <a th:href="@{/admin/seasons/{id}(id=${race.matchday.season.id})}" class="detail-link"
                           th:text="${race.matchday.season.displayLabel}" style="font-size:13px;"></a>
                    </td>
                    <td>
                        <a th:href="@{/admin/matchdays/{id}(id=${race.matchday.id})}" class="detail-link"
                           th:text="${race.matchday.label}"></a>
                    </td>
                    <td class="text-dim" style="font-size:13px; white-space:nowrap;"
                        th:data-london-time="${race.dateTime != null ? race.dateTime.toString().substring(0, 16) : ''}"
                        th:text="${race.dateTime != null ? #temporals.format(race.dateTime, 'dd.MM.yyyy HH:mm') : '-'}"></td>
                    <td>
                        <a th:href="@{/admin/races/{id}(id=${race.id})}" class="detail-link">
                            <strong th:text="${race.homeTeam?.shortName ?: '-'}"></strong>
                        </a>
                    </td>
                    <td style="text-align:center; color:var(--text-dim);">vs</td>
                    <td>
                        <a th:href="@{/admin/races/{id}(id=${race.id})}" class="detail-link">
                            <strong th:text="${race.awayTeam?.shortName ?: (race.isBye() ? 'Bye' : '-')}"></strong>
                        </a>
                    </td>
                    <td th:text="${race.track?.name ?: '-'}" class="text-dim"></td>
                    <td th:text="${race.car?.displayName ?: '-'}" class="text-dim"></td>
                    <td>
                        <span th:if="${race.playoffMatchup != null}" class="badge" style="background:rgba(79,195,247,0.1); color:var(--accent);">Playoff</span>
                        <span th:if="${race.match != null && race.playoffMatchup == null}" class="badge badge-inactive">Match</span>
                    </td>
                    <td style="text-align:center;">
                        <span th:if="${raceScores.containsKey(race.id)}" class="score-display" style="font-size:14px;"
                              th:with="scores=${raceScores[race.id]}">
                            <span th:classappend="${scores[0] > scores[1] ? 'score-win' : (scores[0] < scores[1] ? 'score-loss' : 'score-draw')}" th:text="${scores[0]}"></span>
                            <span style="color:var(--text-dim);">:</span>
                            <span th:classappend="${scores[1] > scores[0] ? 'score-win' : (scores[1] < scores[0] ? 'score-loss' : 'score-draw')}" th:text="${scores[1]}"></span>
                        </span>
                        <span th:unless="${raceScores.containsKey(race.id)}" class="badge badge-inactive">Open</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/admin/races/{id}(id=${race.id})}" class="btn btn-secondary btn-sm">Detail</a>
                    </td>
                </tr>
            </tbody>
        </table>
        </div>
        <div th:if="${races.isEmpty()}" class="empty-state"><p>No races found.</p></div>
    </div>

    <script>
    (function() {
        // Client-side text filter
        var filterInput = document.getElementById('raceFilter');
        if (filterInput) {
            filterInput.addEventListener('input', function() {
                var q = this.value.toLowerCase();
                var rows = document.querySelectorAll('#racesTable tbody tr');
                rows.forEach(function(row) {
                    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
                });
            });
        }

        // Client-side column sorting
        document.querySelectorAll('#racesTable th.sortable').forEach(function(th) {
            th.addEventListener('click', function() {
                var table = document.getElementById('racesTable');
                var tbody = table.querySelector('tbody');
                var rows = Array.from(tbody.querySelectorAll('tr'));
                var col = parseInt(this.dataset.col);
                var asc = this.dataset.sort !== 'asc';

                // Reset all headers
                table.querySelectorAll('th.sortable').forEach(function(h) { h.removeAttribute('data-sort'); });
                this.dataset.sort = asc ? 'asc' : 'desc';

                rows.sort(function(a, b) {
                    var aText = (a.children[col]?.textContent || '').trim().toLowerCase();
                    var bText = (b.children[col]?.textContent || '').trim().toLowerCase();
                    return asc ? aText.localeCompare(bText) : bText.localeCompare(aText);
                });

                rows.forEach(function(row) { tbody.appendChild(row); });
            });
        });
    })();
    </script>
</section>
</body>
</html>
