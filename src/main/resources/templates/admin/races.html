<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Rennen', ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <h1>
            <span th:if="${matchday != null}" th:text="'Rennen — ' + ${matchday.label} + ' (' + ${matchday.season.name} + ')'">Rennen</span>
            <span th:if="${matchday == null}">Alle Rennen</span>
        </h1>
        <a th:href="@{/admin/races/new(matchdayId=${matchday?.id})}" class="btn btn-primary">+ Neues Rennen</a>
    </div>
    <div class="card">
        <table th:if="${!races.isEmpty()}">
            <thead>
                <tr><th>Home</th><th></th><th>Away</th><th>Strecke</th><th>Auto</th><th>Ergebnisse</th><th>Aktionen</th></tr>
            </thead>
            <tbody>
                <tr th:each="race : ${races}">
                    <td><strong th:text="${race.homeTeam.shortName}"></strong></td>
                    <td style="text-align:center">vs</td>
                    <td><strong th:text="${race.awayTeam.shortName}"></strong></td>
                    <td th:text="${race.track ?: '-'}"></td>
                    <td th:text="${race.car ?: '-'}"></td>
                    <td>
                        <span th:if="${race.results.isEmpty()}" class="badge badge-inactive">Offen</span>
                        <span th:unless="${race.results.isEmpty()}" class="badge badge-active"
                              th:text="${race.results.size() + ' Ergebnisse'}"></span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/admin/races/{id}/results(id=${race.id})}" class="btn btn-success btn-sm">Ergebnisse</a>
                        <a th:href="@{/admin/races/{id}/edit(id=${race.id})}" class="btn btn-secondary btn-sm">Bearbeiten</a>
                        <form th:action="@{/admin/races/{id}/delete(id=${race.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Rennen wirklich löschen?')">
                            <button type="submit" class="btn btn-danger btn-sm">Löschen</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${races.isEmpty()}" class="empty-state"><p>Noch keine Rennen angelegt.</p></div>
    </div>
</section>
</body>
</html>
