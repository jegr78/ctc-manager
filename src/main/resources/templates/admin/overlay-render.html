<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif;
            background: transparent;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Top bar: Team matchup */
        .top-bar {
            display: flex;
            align-items: stretch;
            height: 90px;
        }

        .team-bar {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
        }

        .team-bar.home {
            justify-content: flex-start;
        }

        .team-bar.away {
            justify-content: flex-end;
        }

        .team-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            padding: 5px;
        }

        .team-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .team-info.home {
            align-items: flex-start;
        }

        .team-info.away {
            align-items: flex-end;
        }

        .team-name {
            font-size: 22px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

        .team-record {
            font-size: 28px;
            font-weight: 900;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

        .vs-badge {
            width: 120px;
            min-width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
        }

        .vs-badge img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        /* Middle: transparent */
        .spacer {
            flex: 1;
        }

        /* Bottom bar: Branding */
        .bottom-bar {
            height: 80px;
            background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            padding: 0 48px;
            gap: 20px;
            border-top: 3px solid #555;
        }

        .ctc-branding {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .ctc-logo {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        .ctc-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            text-transform: uppercase;
        }

        .matchday-label {
            font-size: 36px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- Top: Team matchup bar -->
    <div class="top-bar">
        <div class="team-bar home"
             th:style="'background: linear-gradient(90deg, color-mix(in srgb, ' + ${homePrimaryColor ?: '#333'} + ' 80%, black) 0%, transparent 100%);'">
            <img th:if="${homeLogoBase64 != null}" th:src="${homeLogoBase64}" alt="" class="team-logo">
            <div class="team-info home">
                <span class="team-name" th:text="${homeTeamName}"></span>
                <span class="team-record" th:text="${homeRecord}"></span>
            </div>
        </div>
        <div class="vs-badge">
            <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="VS">
        </div>
        <div class="team-bar away"
             th:style="'background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, ' + ${awayPrimaryColor ?: '#333'} + ' 80%, black) 100%);'">
            <div class="team-info away">
                <span class="team-name" th:text="${awayTeamName}"></span>
                <span class="team-record" th:text="${awayRecord}"></span>
            </div>
            <img th:if="${awayLogoBase64 != null}" th:src="${awayLogoBase64}" alt="" class="team-logo">
        </div>
    </div>

    <!-- Middle: Transparent area for stream content -->
    <div class="spacer"></div>

    <!-- Bottom: Branding bar -->
    <div class="bottom-bar">
        <div class="ctc-branding">
            <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="CTC" class="ctc-logo">
            <span class="ctc-text">Community Team Cup <span th:text="${seasonYear}"></span></span>
        </div>
        <span class="matchday-label" th:text="${matchdayName}"></span>
    </div>
</body>
</html>
