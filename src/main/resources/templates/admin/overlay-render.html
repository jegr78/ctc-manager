<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif;
            background: transparent;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Top bar: Team matchup — centered */
        .top-bar {
            display: flex;
            justify-content: center;
            padding: 0;
        }

        .matchup {
            display: flex;
            align-items: stretch;
            height: 90px;
            width: 700px;
        }

        .team-bar {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
        }

        .team-bar.home {
            justify-content: flex-start;
        }

        .team-bar.away {
            justify-content: flex-end;
        }

        .team-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            padding: 5px;
        }

        .team-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .team-info.home {
            align-items: flex-end;
        }

        .team-info.away {
            align-items: flex-start;
        }

        .team-name {
            font-size: 20px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.2;
        }

        .team-record {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            line-height: 1.2;
        }

        .vs-badge {
            width: 100px;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.75);
        }

        .vs-badge img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }

        /* Middle: transparent */
        .spacer {
            flex: 1;
        }

        /* Bottom bar: Branding — matching example position/size */
        .bottom-wrapper {
            display: flex;
            justify-content: center;
            padding-bottom: 0;
        }

        .bottom-bar {
            width: 1100px;
            height: 100px;
            background: linear-gradient(180deg, #555 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            padding: 0 48px;
            gap: 32px;
            transform: skewX(-5deg);
            border: 2px solid #777;
        }

        .bottom-bar > * {
            transform: skewX(5deg);
        }

        .ctc-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .ctc-text-block {
            display: flex;
            flex-direction: column;
            gap: 0;
            flex: 1;
        }

        .ctc-text-line1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 4px;
            color: white;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .ctc-text-line2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ccc;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .matchday-label {
            font-size: 40px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <!-- Top: Team matchup bar (centered) -->
    <div class="top-bar">
        <div class="matchup">
            <div class="team-bar home"
                 th:style="'background: linear-gradient(90deg, color-mix(in srgb, ' + ${homePrimaryColor ?: '#333'} + ' 80%, black) 0%, color-mix(in srgb, ' + ${homePrimaryColor ?: '#333'} + ' 30%, white) 100%);'">
                <img th:if="${homeLogoBase64 != null}" th:src="${homeLogoBase64}" alt="" class="team-logo">
                <div class="team-info home">
                    <span class="team-name" th:text="${homeTeamName}"></span>
                    <span class="team-record" th:text="${homeRecord}"></span>
                </div>
            </div>
            <div class="vs-badge">
                <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="VS">
            </div>
            <div class="team-bar away"
                 th:style="'background: linear-gradient(90deg, color-mix(in srgb, ' + ${awayPrimaryColor ?: '#333'} + ' 30%, white) 0%, color-mix(in srgb, ' + ${awayPrimaryColor ?: '#333'} + ' 80%, black) 100%);'">
                <div class="team-info away">
                    <span class="team-name" th:text="${awayTeamName}"></span>
                    <span class="team-record" th:text="${awayRecord}"></span>
                </div>
                <img th:if="${awayLogoBase64 != null}" th:src="${awayLogoBase64}" alt="" class="team-logo">
            </div>
        </div>
    </div>

    <!-- Middle: Transparent area for stream content -->
    <div class="spacer"></div>

    <!-- Bottom: Branding bar (centered, skewed) -->
    <div class="bottom-wrapper">
        <div class="bottom-bar">
            <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="CTC" class="ctc-logo">
            <div class="ctc-text-block">
                <span class="ctc-text-line1">Community</span>
                <span class="ctc-text-line2">Team Cup <span th:text="${seasonYear}"></span></span>
            </div>
            <span class="matchday-label" th:text="${matchdayName}"></span>
        </div>
    </div>
</body>
</html>
