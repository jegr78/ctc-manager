<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            background: #111111;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, #c0c0c0 0%, #a0a0a0 100%);
            padding: 20px 96px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 120px;
        }

        .header-left {
            text-align: left;
            flex: 1;
        }

        .header-left .title {
            font-size: 26px;
            font-weight: 900;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .header-left .year {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-top: 8px;
        }

        .header-center {
            text-align: center;
            flex: 1;
        }

        .header-center .scorecard-title {
            font-size: 50px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: 2px;
        }

        .header-center .matchday {
            font-size: 26px;
            font-weight: 700;
            color: white;
        }

        .header-center .race-label {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .header-right img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* Main content — 2 stacked team-blocks */
        .main {
            flex: 1;
            background: #111111;
            display: flex;
            flex-direction: column;
            padding: 16px 48px;
            gap: 16px;
            overflow: hidden;
        }

        .team-block {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 24px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px 24px;
            border-left: 6px solid #c0c0c0;
        }

        .team-block--home {
            border-left-color: #4a90e2;
        }

        .team-block--away {
            border-left-color: #e25a4a;
        }

        .team-card-cell {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .team-card-cell img {
            max-height: 160px;
            max-width: 200px;
            object-fit: contain;
            border: 3px solid white;
            border-radius: 12px;
        }

        .team-card-cell .team-name {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .provisional-table-wrapper {
            flex: 1;
            overflow: hidden;
        }

        .provisional-table {
            width: 100%;
            border-collapse: collapse;
            font-variant-numeric: tabular-nums;
            color: white;
        }

        .provisional-table th {
            background: linear-gradient(180deg, #2a2a2a 0%, #1f1f1f 100%);
            color: #b2b2b2;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 8px;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        .provisional-table th.col-driver {
            text-align: left;
            padding-left: 16px;
        }

        .provisional-table td {
            font-size: 22px;
            font-weight: 700;
            color: white;
            padding: 8px 8px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .provisional-table td.col-driver {
            text-align: left;
            padding-left: 16px;
        }

        .provisional-table tfoot .overall-row td {
            background: linear-gradient(180deg, #2a2a2a 0%, #222 100%);
            font-size: 22px;
            font-weight: 900;
            color: #ffd166;
            border-top: 2px solid #444;
            border-bottom: none;
            padding: 12px 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .provisional-table tfoot .overall-row td.col-driver {
            text-align: left;
            padding-left: 16px;
        }

        .fl-marker {
            color: #ffd166;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="title">Community<br>Team Cup</div>
            <div class="year" th:text="${seasonYear}"></div>
        </div>
        <div class="header-center">
            <div class="scorecard-title">Provisional Scores</div>
            <div class="matchday" th:text="${matchdayName}"></div>
            <div class="race-label" th:text="${raceLabel}"></div>
        </div>
        <div class="header-right">
            <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="CTC">
        </div>
    </div>

    <div class="main">
        <div class="team-block team-block--home">
            <div class="team-card-cell">
                <img th:src="${homeCardBase64}" alt="Home Team Card">
                <div class="team-name" th:text="${homeTeamName}"></div>
            </div>
            <div class="provisional-table-wrapper">
                <table class="provisional-table">
                    <thead>
                        <tr>
                            <th class="col-driver">Driver</th>
                            <th>Position</th>
                            <th>Quali</th>
                            <th>FL</th>
                            <th>Pts-Race</th>
                            <th>Pts-Quali</th>
                            <th>Pts-FL</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${homeRows}">
                            <td class="col-driver" th:text="${row.driverName}"></td>
                            <td th:text="${row.position}"></td>
                            <td th:text="${row.qualiPosition}"></td>
                            <td><span class="fl-marker" th:if="${row.fastestLap}">FL</span></td>
                            <td th:text="${row.ptsRace}"></td>
                            <td th:text="${row.ptsQuali}"></td>
                            <td th:text="${row.ptsFl}"></td>
                            <td th:text="${row.total}"></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="overall-row">
                            <td class="col-driver">Overall</td>
                            <td colspan="3"></td>
                            <td th:text="${homeOverallPtsRace}"></td>
                            <td th:text="${homeOverallPtsQuali}"></td>
                            <td th:text="${homeOverallPtsFl}"></td>
                            <td th:text="${homeOverallTotal}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="team-block team-block--away">
            <div class="team-card-cell">
                <img th:src="${awayCardBase64}" alt="Away Team Card">
                <div class="team-name" th:text="${awayTeamName}"></div>
            </div>
            <div class="provisional-table-wrapper">
                <table class="provisional-table">
                    <thead>
                        <tr>
                            <th class="col-driver">Driver</th>
                            <th>Position</th>
                            <th>Quali</th>
                            <th>FL</th>
                            <th>Pts-Race</th>
                            <th>Pts-Quali</th>
                            <th>Pts-FL</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${awayRows}">
                            <td class="col-driver" th:text="${row.driverName}"></td>
                            <td th:text="${row.position}"></td>
                            <td th:text="${row.qualiPosition}"></td>
                            <td><span class="fl-marker" th:if="${row.fastestLap}">FL</span></td>
                            <td th:text="${row.ptsRace}"></td>
                            <td th:text="${row.ptsQuali}"></td>
                            <td th:text="${row.ptsFl}"></td>
                            <td th:text="${row.total}"></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="overall-row">
                            <td class="col-driver">Overall</td>
                            <td colspan="3"></td>
                            <td th:text="${awayOverallPtsRace}"></td>
                            <td th:text="${awayOverallPtsQuali}"></td>
                            <td th:text="${awayOverallPtsFl}"></td>
                            <td th:text="${awayOverallTotal}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
