<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Race: ' + ${race.homeTeam.shortName} + ' vs ' + ${race.awayTeam.shortName}, ~{::section})}">
<body>
<section>
    <div class="toolbar">
        <div>
            <a th:href="@{/admin/races(matchdayId=${race.matchday.id})}" class="back-link">&larr; Back to Races</a>
            <h1>
                <span th:text="${race.homeTeam.shortName}"></span> vs
                <span th:text="${race.awayTeam.shortName}"></span>
            </h1>
        </div>
        <div class="actions">
            <a th:href="@{/admin/races/{id}/results(id=${race.id})}" class="btn btn-success">Results</a>
            <a th:href="@{/admin/races/{id}/edit(id=${race.id})}" class="btn btn-primary">Edit</a>
            <form th:action="@{/admin/races/{id}/delete(id=${race.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Really delete this race?')">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="detail-fields">
            <span class="label">Matchday</span>
            <a th:href="@{/admin/matchdays/{id}(id=${race.matchday.id})}" class="detail-link" th:text="${race.matchday.label}"></a>
            <span class="label">Home Team</span>
            <a th:href="@{/admin/teams/{id}(id=${race.homeTeam.id})}" class="detail-link" th:text="${race.homeTeam.name}"></a>
            <span class="label">Away Team</span>
            <a th:href="@{/admin/teams/{id}(id=${race.awayTeam.id})}" class="detail-link" th:text="${race.awayTeam.name}"></a>
            <span class="label">Track</span>
            <span th:text="${race.track ?: '-'}"></span>
            <span class="label">Car</span>
            <span th:text="${race.car ?: '-'}"></span>
            <span class="label">Date &amp; Time</span>
            <span th:text="${race.dateTime != null ? #temporals.format(race.dateTime, 'dd.MM.yyyy HH:mm') : '-'}"></span>
            <span class="label">Playoff</span>
            <span th:if="${race.playoffMatchup != null}">
                <a th:href="@{/admin/playoffs/matchup/{id}(id=${race.playoffMatchup.id})}" class="detail-link" th:text="'Matchup #' + ${race.playoffMatchup.bracketPosition}"></a>
            </span>
            <span th:if="${race.playoffMatchup == null}">-</span>
        </div>

        <div class="detail-section">
            <h2 th:text="'Results (' + ${race.results.size()} + ')'"></h2>
            <div th:if="${!race.results.isEmpty()}">
                <table>
                    <thead>
                        <tr><th>Pos</th><th>Driver</th><th>Quali</th><th>FL</th><th>Points</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="result : ${race.results}">
                            <td th:text="${result.position}"></td>
                            <td><a th:href="@{/admin/drivers/{id}(id=${result.driver.id})}" class="detail-link" th:text="${result.driver.psnId}"></a></td>
                            <td th:text="${result.qualiPosition}"></td>
                            <td th:text="${result.fastestLap ? '&#x2713;' : ''}"></td>
                            <td th:text="${result.pointsTotal}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${race.results.isEmpty()}" class="empty-state" style="padding:16px;"><p>No results yet.</p></div>
        </div>
    </div>

    <!-- Attachments -->
    <div class="card">
        <h2 th:text="'Attachments (' + ${race.attachments.size()} + ')'"></h2>

        <!-- Existing attachments -->
        <div th:if="${!race.attachments.isEmpty()}" class="attachment-list">
            <div th:each="att : ${race.attachments}" class="attachment-item">
                <div class="attachment-preview">
                    <img th:if="${att.image}" th:src="${att.url}" alt="" class="attachment-thumb">
                    <span th:if="${att.type.name() == 'LINK'}" class="attachment-icon">&#x1F517;</span>
                    <span th:if="${att.type.name() == 'FILE' && !att.image}" class="attachment-icon">&#x1F4CE;</span>
                </div>
                <div class="attachment-info">
                    <a th:if="${att.type.name() == 'LINK'}" th:href="${att.url}" target="_blank" rel="noopener" class="detail-link" th:text="${att.name}"></a>
                    <a th:if="${att.type.name() == 'FILE'}" th:href="${att.url}" target="_blank" class="detail-link" th:text="${att.name}"></a>
                    <span class="text-dim" style="font-size:12px;"
                          th:text="${att.type.name() == 'LINK' ? att.url : ''} + ' ' + (#temporals.format(att.createdAt, 'dd.MM.yyyy HH:mm'))"></span>
                </div>
                <form th:action="@{/admin/races/attachments/{aid}/delete(aid=${att.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Delete this attachment?')">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </div>
        </div>
        <div th:if="${race.attachments.isEmpty()}" class="empty-state" style="padding:16px;">
            <p>No attachments yet. Upload files or add links below.</p>
        </div>

        <!-- Upload form -->
        <div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;">
            <form th:action="@{/admin/races/{id}/attachments/upload(id=${race.id})}" method="post" enctype="multipart/form-data"
                  style="display:flex;gap:8px;align-items:flex-end;">
                <div class="form-group" style="margin-bottom:0;">
                    <label>Upload File</label>
                    <input type="file" name="file" required accept="image/png,image/jpeg,image/gif,image/webp,application/pdf"
                           style="padding:6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--white);font-size:13px;">
                    <small class="text-dim" style="display:block;margin-top:2px;">PNG, JPG, WebP, GIF, PDF. Max 10 MB</small>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Upload</button>
            </form>

            <form th:action="@{/admin/races/{id}/attachments/link(id=${race.id})}" method="post"
                  style="display:flex;gap:8px;align-items:flex-end;">
                <div class="form-group" style="margin-bottom:0;">
                    <label>Add Link</label>
                    <div style="display:flex;gap:8px;">
                        <input type="text" name="name" placeholder="Title" required
                               style="width:120px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--white);font-size:13px;">
                        <input type="url" name="url" placeholder="https://..." required
                               style="width:200px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--white);font-size:13px;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Add</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
