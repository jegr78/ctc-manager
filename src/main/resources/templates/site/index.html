<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout(${season != null ? season.name : 'Community Team Cup'}, ~{::section})}">
<body>
<section>
    <div class="hero">
        <div class="hero-label" th:if="${season}" th:text="'Season ' + ${season.name} + ' — ' + ${season.year}"></div>
        <h1>COMMUNITY TEAM CUP</h1>
        <p class="hero-sub">Gran Turismo — Team vs. Team Racing League</p>
    </div>

    <!-- Standings -->
    <div class="section" th:if="${standings != null && !standings.isEmpty()}">
        <h2 class="section-title">Team Standings</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Team</th><th class="text-center">MP</th>
                        <th class="text-center">W</th><th class="text-center">D</th><th class="text-center">L</th>
                        <th class="text-center">PR</th><th class="text-right">Pts</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s, i : ${standings}">
                        <td class="font-bold text-white" th:text="${i.count}"></td>
                        <td class="font-bold">
                            <a class="entity-link" th:href="${teamSlugMap.get(s.team.id)}" th:text="${s.team.shortName}"></a>
                        </td>
                        <td class="text-center" th:text="${s.played}"></td>
                        <td class="text-center" th:text="${s.wins}"></td>
                        <td class="text-center" th:text="${s.draws}"></td>
                        <td class="text-center" th:text="${s.losses}"></td>
                        <td class="text-center text-dim" th:text="${s.pointsRatio}"></td>
                        <td class="text-right font-bold text-white text-lg" th:text="${s.points}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Last Matchday -->
    <div class="section" th:if="${lastMatchday != null}">
        <h2 class="section-title" th:text="${lastMatchday.label}"></h2>
        <div class="match-grid">
            <div class="match-card" th:each="race : ${lastMatchdayRaces}">
                <th:block th:insert="~{site/fragments/match-card :: matchCardBody(${race})}"></th:block>
            </div>
        </div>
    </div>
</section>
</body>
</html>
