<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout('Community Team Cup', ~{::section})}">
<body>
<section>
    <!-- Hero with YouTube background video -->
    <div class="hero" th:classappend="${videoId != null and !#strings.isEmpty(videoId)} ? ' hero--video'">
        <div class="hero-video-bg" th:if="${videoId != null and !#strings.isEmpty(videoId)}">
            <div id="yt-hero-player"></div>
        </div>
        <div class="hero-video-overlay" th:if="${videoId != null and !#strings.isEmpty(videoId)}" aria-hidden="true"></div>
        <div class="hero-content">
            <h1>COMMUNITY TEAM CUP</h1>
            <p class="hero-sub">Gran Turismo — Team vs. Team Racing League</p>
        </div>
    </div>
    <script th:if="${videoId != null and !#strings.isEmpty(videoId)}" th:inline="javascript">
    (function() {
        var videoId = /*[[${videoId}]]*/ '';
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        var playerReady = false;
        window.onYouTubeIframeAPIReady = function() {
            new YT.Player('yt-hero-player', {
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 0,
                    loop: 1,
                    playlist: videoId,
                    rel: 0,
                    playsinline: 1,
                    disablekb: 1,
                    fs: 0,
                    iv_load_policy: 3
                },
                events: {
                    onReady: function(event) {
                        playerReady = true;
                        event.target.playVideo();
                    },
                    onStateChange: function(event) {
                        if (!playerReady) return;
                        try {
                            if (event.data === YT.PlayerState.ENDED) {
                                event.target.seekTo(0);
                                event.target.playVideo();
                            }
                        } catch (e) {
                            // player may be unavailable during page unload
                        }
                    }
                }
            });
        };
    })();
    </script>

    <!-- Tile Navigation -->
    <div class="tile-grid">
        <a class="tile-card" th:href="${rootPath + '/archive.html'}">
            <div class="tile-card-label">Seasons</div>
            <div class="tile-card-desc">Browse all seasons</div>
        </a>
        <a class="tile-card"
           th:if="${activeSeasonSlug != null and !#strings.isEmpty(activeSeasonSlug)}"
           th:href="${rootPath + '/season/' + activeSeasonSlug + '/standings.html'}">
            <div class="tile-card-label">Standings</div>
            <div class="tile-card-desc">Current standings</div>
        </a>
        <a class="tile-card" th:href="${rootPath + '/drivers.html'}">
            <div class="tile-card-label">Drivers</div>
            <div class="tile-card-desc">All drivers</div>
        </a>
        <a class="tile-card" th:href="${rootPath + '/teams.html'}">
            <div class="tile-card-label">Teams</div>
            <div class="tile-card-desc">All teams</div>
        </a>
        <a class="tile-card" th:href="${rootPath + '/links.html'}">
            <div class="tile-card-label">Links</div>
            <div class="tile-card-desc">Community links</div>
        </a>
    </div>
</section>
</body>
</html>
