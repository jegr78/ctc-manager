<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout(${team.name}, ~{::section})}">
<body>
<section>
    <div class="team-header">
        <img th:if="${teamLogoRelPath}" th:src="${teamLogoRelPath}" class="team-logo" th:alt="${team.shortName}">
        <div>
            <h1 class="text-white" th:text="${team.shortName + ' — ' + team.name}"></h1>
            <p class="season-meta" th:text="${season.displayLabel}"></p>
        </div>
    </div>

    <div class="section" th:if="${standing != null}">
        <h2 class="section-title">Record</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>MP</th><th>W</th><th>D</th><th>L</th><th>PR</th><th class="text-right">Pts</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td th:text="${standing.played}"></td>
                        <td th:text="${standing.wins}"></td>
                        <td th:text="${standing.draws}"></td>
                        <td th:text="${standing.losses}"></td>
                        <td th:text="${standing.pointsRatio}"></td>
                        <td class="text-right font-bold text-white text-lg" th:text="${standing.points}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section" th:if="${drivers != null and not #lists.isEmpty(drivers)}">
        <h2 class="section-title">Drivers</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Driver</th><th class="text-right">Points</th></tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${drivers}">
                        <td>
                            <a class="entity-link font-bold" th:href="${d.driverProfileUrl}" th:text="${d.psnId}"></a>
                        </td>
                        <td class="text-right font-bold text-white" th:text="${d.totalPoints}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div><div class="section section-gap" th:if="${showPhaseBreakdown}">
        <h2 class="section-title">Phase Breakdown</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Phase</th><th class="text-right">Result</th></tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${phaseBreakdown}">
                        <td th:text="${entry.label}"></td>
                        <td class="text-right" th:text="${entry.summary}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
