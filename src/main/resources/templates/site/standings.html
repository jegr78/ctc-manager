<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout('Tabelle ' + ${season.name}, ~{::section})}">
<body>
<section>
    <div class="section">
        <h2 class="section-title" th:text="'Teamtabelle — ' + ${season.name}"></h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Team</th><th class="text-center">Sp</th>
                        <th class="text-center">S</th><th class="text-center">U</th><th class="text-center">N</th>
                        <th class="text-center">PV</th><th class="text-right">Pkt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s, i : ${standings}">
                        <td class="font-bold text-white" th:text="${i.count}"></td>
                        <td>
                            <strong class="text-white" th:text="${s.team.shortName}"></strong>
                            <span class="text-dim" th:text="' ' + ${s.team.name}"></span>
                        </td>
                        <td class="text-center" th:text="${s.played}"></td>
                        <td class="text-center" th:text="${s.wins}"></td>
                        <td class="text-center" th:text="${s.draws}"></td>
                        <td class="text-center" th:text="${s.losses}"></td>
                        <td class="text-center text-dim" th:text="${s.pointsRatio}"></td>
                        <td class="text-right font-bold text-white text-lg" th:text="${s.points}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
