<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout(${matchday.label}, ~{::section})}">
<body>
<section>
    <div class="section">
        <h2 class="section-title" th:text="${matchday.label + ' — ' + season.name}"></h2>
        <div class="match-grid">
            <div class="match-card" th:each="race : ${races}">
                <div class="match-teams">
                    <span class="match-team text-white" th:text="${race.homeTeamShortName}"></span>
                    <span class="match-score" th:if="${race.hasResults}" th:text="${race.score}"></span>
                    <span class="match-score match-score-draw" th:unless="${race.hasResults}">vs</span>
                    <span class="match-team" th:text="${race.awayTeamShortName}"></span>
                </div>
                <div class="match-meta">
                    <span th:text="${race.track ?: ''}"></span>
                    <span th:if="${race.track != null && race.car != null}"> — </span>
                    <span th:text="${race.car ?: ''}"></span>
                </div>

                <div th:if="${race.hasResults}" class="match-results">
                    <table>
                        <thead>
                            <tr><th>Driver</th><th>Team</th><th class="text-center">Pos</th><th class="text-center">Quali</th><th class="text-center">FL</th><th class="text-right">Pts</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="result : ${race.results}">
                                <td class="font-bold" th:text="${result.driverPsnId}"></td>
                                <td class="text-dim" th:text="${result.teamShortName}"></td>
                                <td class="text-center" th:text="${result.position}"></td>
                                <td class="text-center" th:text="${result.qualiPosition}"></td>
                                <td class="text-center" th:text="${result.fastestLap ? 'FL' : ''}"></td>
                                <td class="text-right font-bold" th:text="${result.pointsTotal}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
