<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout('Archive', ~{::section})}">
<body>
<section>
    <div class="section">
        <h2 class="section-title">Season Archive</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Season</th><th>Period</th><th>Status</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${seasonEntries}">
                        <td class="font-bold text-white">
                            <span th:text="${entry.season.name}"></span>
                            <p class="season-meta" th:text="${entry.season.year + ' | #' + entry.season.number}"></p>
                        </td>
                        <td class="text-dim">
                            <span th:if="${entry.season.startDate}" th:text="${entry.season.startDate}"></span>
                            <span th:if="${entry.season.startDate != null and entry.season.endDate != null}"> — </span>
                            <span th:if="${entry.season.endDate}" th:text="${entry.season.endDate}"></span>
                        </td>
                        <td>
                            <span th:if="${entry.season.active}" style="color:#4fc3f7;">Active</span>
                            <span th:unless="${entry.season.active}" class="text-dim">Completed</span>
                        </td>
                        <td class="text-right">
                            <a th:href="'season/' + ${entry.slug} + '/standings.html'"
                               style="color:var(--accent); text-decoration:none;">Standings</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
