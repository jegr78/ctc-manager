<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout('Archiv', ~{::section})}">
<body>
<section>
    <div class="section">
        <h2 class="section-title">Saisonarchiv</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Saison</th><th>Zeitraum</th><th>Status</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${seasons}">
                        <td class="font-bold text-white" th:text="${s.name}"></td>
                        <td class="text-dim">
                            <span th:if="${s.startDate}" th:text="${s.startDate}"></span>
                            <span th:if="${s.startDate != null and s.endDate != null}"> — </span>
                            <span th:if="${s.endDate}" th:text="${s.endDate}"></span>
                        </td>
                        <td>
                            <span th:if="${s.active}" style="color:#4fc3f7;">Aktiv</span>
                            <span th:unless="${s.active}" class="text-dim">Abgeschlossen</span>
                        </td>
                        <td class="text-right">
                            <a th:href="'season/' + ${#strings.toLowerCase(#strings.replace(s.name, ' ', '-'))} + '/standings.html'"
                               style="color:var(--accent); text-decoration:none;">Tabelle</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
