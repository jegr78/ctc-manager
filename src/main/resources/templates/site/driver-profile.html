<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{site/layout :: layout(${driver.psnId}, ~{::section})}">
<body>
<section>
    <div style="margin-bottom: 24px;">
        <h1 class="text-white" th:text="${driver.psnId}"></h1>
        <p class="text-dim" th:text="${driver.nickname}"></p>
        <p class="text-dim" th:if="${team != null}" th:text="'Team: ' + ${team.shortName} + ' — ' + ${team.name} + ' (Saison ' + ${season.name} + ')'"></p>
    </div>

    <div class="section" th:if="${results != null && !results.isEmpty()}">
        <h2 class="section-title" th:text="'Rennhistorie — ' + ${season.name}"></h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Spieltag</th>
                        <th>Gegner</th>
                        <th>Strecke</th>
                        <th class="text-center">Pos</th>
                        <th class="text-center">Quali</th>
                        <th class="text-center">FL</th>
                        <th class="text-right">Punkte</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="result : ${results}">
                        <td th:text="${result.race.matchday.label}"></td>
                        <td>
                            <span th:if="${result.race.homeTeam.id != team?.id}" th:text="${result.race.homeTeam.shortName}"></span>
                            <span th:if="${result.race.awayTeam.id != team?.id}" th:text="${result.race.awayTeam.shortName}"></span>
                        </td>
                        <td class="text-dim" th:text="${result.race.track ?: '-'}"></td>
                        <td class="text-center" th:text="${result.position}"></td>
                        <td class="text-center" th:text="${result.qualiPosition}"></td>
                        <td class="text-center" th:text="${result.fastestLap ? 'FL' : ''}"></td>
                        <td class="text-right font-bold text-white" th:text="${result.pointsTotal}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section" style="margin-top: 24px;">
        <h2 class="section-title">Statistiken</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Rennen</th><th>Gesamt</th><th>Schnitt</th><th>Beste Pos.</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td th:text="${totalRaces}"></td>
                        <td class="font-bold text-white" th:text="${totalPoints}"></td>
                        <td th:text="${#numbers.formatDecimal(averagePoints, 1, 1)}"></td>
                        <td th:text="'P' + ${bestPosition}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
