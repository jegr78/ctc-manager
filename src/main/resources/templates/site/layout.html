<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="${assetsPath + '/img/ctc-logo-white.png'}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="${assetsPath + '/img/ctc-logo-white.png'}">
    <title th:text="'CTC - ' + ${title}">Community Team Cup</title>
    <link rel="stylesheet" th:href="${assetsPath != null ? assetsPath + '/css/style.css' : '/assets/css/style.css'}">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a th:href="${rootPath + '/index.html'}" class="nav-brand">
                <img th:src="${assetsPath != null ? assetsPath + '/img/ctc-logo-white.png' : '/assets/img/ctc-logo-white.png'}" alt="CTC" class="nav-logo">
                <span>COMMUNITY TEAM CUP</span>
            </a>
            <input type="checkbox" id="nav-toggle" class="nav-toggle-input" aria-label="Toggle navigation">
            <label for="nav-toggle" class="nav-toggle-label">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </label>
            <div class="nav-links">
                <a th:href="${rootPath + '/index.html'}"
                   th:class="${currentPage == 'standings'} ? 'nav-link-active' : ''">Standings</a>
                <a th:if="${activeSeasonSlug != null and !#strings.isEmpty(activeSeasonSlug)}"
                   th:href="${rootPath + '/season/' + activeSeasonSlug + '/driver-ranking.html'}"
                   th:class="${currentPage == 'driver-ranking'} ? 'nav-link-active' : ''">Driver Ranking</a>
                <a th:href="${rootPath + '/archive.html'}"
                   th:class="${currentPage == 'archive'} ? 'nav-link-active' : ''">Archive</a>
            </div>
        </div>
    </nav>
    <nav class="subnav" th:if="${seasonSlug != null and !#strings.isEmpty(seasonSlug)}">
        <div class="subnav-inner">
            <a th:href="${rootPath + '/season/' + seasonSlug + '/standings.html'}"
               th:class="${currentPage == 'standings'} ? 'subnav-link active' : 'subnav-link'">Standings</a>
            <a th:href="${rootPath + '/season/' + seasonSlug + '/matchdays.html'}"
               th:class="${currentPage == 'matchdays'} ? 'subnav-link active' : 'subnav-link'">Matchdays</a>
            <a th:href="${rootPath + '/season/' + seasonSlug + '/driver-ranking.html'}"
               th:class="${currentPage == 'driver-ranking'} ? 'subnav-link active' : 'subnav-link'">Driver Ranking</a>
            <a th:href="${rootPath + '/season/' + seasonSlug + '/playoff.html'}"
               th:class="${currentPage == 'playoff'} ? 'subnav-link active' : 'subnav-link'">Playoff</a>
        </div>
    </nav>
    <nav class="breadcrumb" aria-label="breadcrumb"
         th:if="${breadcrumbCurrent != null and !#strings.isEmpty(breadcrumbCurrent)}">
        <a class="breadcrumb-link" th:href="${rootPath + '/index.html'}">Home</a>
        <span class="breadcrumb-sep" aria-hidden="true"> &gt; </span>
        <a class="breadcrumb-link"
           th:href="${rootPath + '/season/' + seasonSlug + '/standings.html'}"
           th:text="${seasonName}">Season</a>
        <span class="breadcrumb-sep" aria-hidden="true"> &gt; </span>
        <span class="breadcrumb-current" th:text="${breadcrumbCurrent}">Page</span>
    </nav>
    <main class="main">
        <div th:replace="${content}"></div>
    </main>
    <footer class="footer">
        <p>Community Team Cup — Gran Turismo Racing League</p>
    </footer>
</body>
</html>
