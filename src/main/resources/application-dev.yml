server:
  port: 9090
  error:
    include-stacktrace: always
    include-message: always

spring:
  datasource:
    url: jdbc:h2:mem:ctcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    locations: classpath:db/migration
  web:
    resources:
      cache:
        period: 0

app:
  upload-dir: data/dev/uploads
  discord:
    # Dev-profile auto-seed for DiscordGlobalConfig (Plan 94-04). Empty defaults
    # → seeder silently skips. Set DISCORD_DEV_GUILD_ID (and other vars) via
    # .env.dev or shell env to activate. See .env.example for the full list.
    dev-seed:
      enabled: ${DISCORD_DEV_SEED_ENABLED:true}
      guild-id: ${DISCORD_DEV_GUILD_ID:}
      bot-app-id: ${DISCORD_DEV_BOT_APP_ID:}
      current-match-category-id: ${DISCORD_DEV_CURRENT_MATCH_CATEGORY:}
      race-results-forum-channel-id: ${DISCORD_DEV_RESULTS_FORUM:}
      standings-forum-channel-id: ${DISCORD_DEV_STANDINGS_FORUM:}
      vs-emoji-name: ${DISCORD_DEV_VS_EMOJI:}
      announcement-webhook-url: ${DISCORD_DEV_ANNOUNCEMENT_WEBHOOK_URL:}

logging:
  level:
    org.ctc: DEBUG

ctc:
  site:
    output-dir: target/site
    youtube-channel-url: "https://www.youtube.com/@CommunityTeamCup"
    youtube-video-id: "epWntosO4gM"
