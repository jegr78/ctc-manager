server:
  port: 9090
  error:
    include-stacktrace: always
    include-message: always

spring:
  datasource:
    url: jdbc:h2:mem:ctcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    locations: classpath:db/migration
  web:
    resources:
      cache:
        period: 0

google:
  sheets:
    credentials-path: google-credentials.json

ctc:
  site:
    output-dir: target/site
