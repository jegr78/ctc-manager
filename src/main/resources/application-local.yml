server:
  port: 9091

app:
  upload-dir: data/local/uploads

spring:
  datasource:
    # Phase 75 RESEARCH §10: rewriteBatchedStatements=true needed for JdbcTemplate.batchUpdate(...)=500 to compile into a single multi-row INSERT on MariaDB
    url: jdbc:mariadb://localhost:3306/ctcdb?rewriteBatchedStatements=true
    driver-class-name: org.mariadb.jdbc.Driver
    username: ctc
    password: ctc
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration
