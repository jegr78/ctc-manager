<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:inline="text">
        @font-face {
            font-family: 'Conthrax';
            src: url([[${fontBase64}]]) format('woff2');
            font-weight: 600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px; overflow: hidden;
            font-family: 'Conthrax', -apple-system, sans-serif; color: #fff;
            display: flex; flex-direction: column;
        }

        /* Kopf-/Fußleiste — Carbon mit Gold-Keyline */
        .header, .footer {
            background: linear-gradient(180deg, #202028 0%, #121217 100%);
            padding: 18px 90px; display: flex; justify-content: space-between;
            align-items: center; min-height: 112px;
        }
        .header { box-shadow: inset 0 -3px 0 rgba(245,197,66,.78); }
        .footer { box-shadow: inset 0 3px 0 rgba(245,197,66,.78); }

        .header-left { text-align: left; flex: 1; }
        .header-left .title { font-size: 27px; font-weight: 900; color: #f2f2f5; text-transform: uppercase; letter-spacing: 3px; line-height: 1.1; }
        .header-left .year { font-size: 29px; font-weight: 700; color: #9a9aa6; margin-top: 6px; }

        .header-center { text-align: center; flex: 1; }
        .header-center .settings-title { font-size: 50px; font-weight: 900; color: #f2f2f5; letter-spacing: 2px;
            white-space: nowrap; display: inline-flex; align-items: center; gap: 18px; }
        .header-center .settings-title::before, .header-center .settings-title::after {
            content: ''; width: 4px; height: 38px; background: #f5c542; display: inline-block; border-radius: 1px; }
        .header-center .matchday { font-size: 29px; font-weight: 700; color: #9a9aa6; margin-top: 2px; }

        .header-right { flex: 1; display: flex; justify-content: flex-end; }
        .header-right img { width: 80px; height: 80px; object-fit: contain; }

        /* Mittelteil — Carbon-Vignette */
        .main {
            flex: 1; position: relative; display: flex; align-items: stretch; padding: 20px 32px; gap: 24px;
            background:
                repeating-linear-gradient(118deg, transparent 0 74px, rgba(255,255,255,.013) 74px 76px),
                radial-gradient(120% 85% at 50% 36%, #15151b 0%, #0d0d11 54%, #08080b 100%);
        }

        .team-card-container { width: 18%; display: flex; align-items: center; justify-content: center; }
        .team-card-container img { max-height: 100%; max-width: 100%; object-fit: contain;
            border: 3px solid #fff; border-radius: 16px; box-shadow: 0 0 0 1px rgba(0,0,0,.45), 0 16px 44px rgba(0,0,0,.55); }

        /* Inhalt + HUD-Eckbrackets */
        .settings { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: space-around; padding: 24px 44px; }
        .settings::before, .settings::after { content: ''; position: absolute; width: 36px; height: 36px; border: 3px solid rgba(245,197,66,.55); }
        .settings::before { top: 0; left: 8px; border-right: 0; border-bottom: 0; }
        .settings::after { bottom: 0; right: 8px; border-left: 0; border-top: 0; }
        .setting-row { text-align: center; }
        .setting-label { font-size: 18px; font-weight: 700; color: #8a8a96; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .setting-value { font-size: 30px; font-weight: 700; color: #eaeaf0; line-height: 1.25; }

        .footer .position { flex: 1; font-size: 56px; font-weight: 900; color: #f2f2f5; }
        .footer .position:last-child { text-align: right; }
        .footer .season-name { flex: 1; text-align: center; font-size: 42px; font-weight: 700; color: #9a9aa6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="title">Community<br>Team Cup</div>
            <div class="year" th:text="${seasonYear}"></div>
        </div>
        <div class="header-center">
            <div class="settings-title">Settings</div>
            <div class="matchday" th:text="${matchdayName}"></div>
        </div>
        <div class="header-right">
            <img th:if="${ctcLogoBase64 != null}" th:src="${ctcLogoBase64}" alt="CTC">
        </div>
    </div>

    <div class="main">
        <div class="team-card-container">
            <img th:src="${homeCardBase64}" alt="Home Team Card">
        </div>

        <div class="settings">
            <div class="setting-row">
                <div class="setting-label">Car</div>
                <div class="setting-value" th:text="${carName}"></div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Track</div>
                <div class="setting-value"><span th:text="${trackName}"></span><br/><span th:text="'(' + ${numberOfLaps} + ' Laps)'"></span></div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Tyre / Fuel / Mandatory Pit Stops</div>
                <div class="setting-value" th:text="${tyreWearMultiplier + 'x / ' + fuelConsumptionMultiplier + 'x / ' + numberOfRequiredPitStops}"></div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Initial Fuel / Refuel Speed</div>
                <div class="setting-value" th:text="${initialFuel + ' / ' + refuelingSpeed + ' l/s'}"></div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Time of Day / Progression</div>
                <div class="setting-value" th:text="${timeOfDay + ' / ' + timeProgressionMultiplier + 'x'}"></div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Weather</div>
                <div class="setting-value" th:text="${weather}"></div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Available Tyres / Mandatory Tyres</div>
                <div class="setting-value" th:text="${availableTyres + ' / ' + mandatoryTyres}"></div>
            </div>
        </div>

        <div class="team-card-container">
            <img th:src="${awayCardBase64}" alt="Away Team Card">
        </div>
    </div>

    <div class="footer">
        <div class="position" th:text="'P' + ${homePosition}"></div>
        <div class="season-name" th:text="${seasonName}"></div>
        <div class="position" th:text="'P' + ${awayPosition}"></div>
    </div>
</body>
</html>
